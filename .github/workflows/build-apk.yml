name: Build Planner APK + AAB
on:
  push:
    branches: [ main ]
    paths:
      - 'app/**'
      - 'index.html'
      - 'build.gradle'
      - 'settings.gradle'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      # Копируем актуальный планировщик из корня репо в assets ПЕРЕД сборкой.
      # Это офлайн-копия для гибрид-фолбэка. index.html остаётся в корне для
      # GitHub Pages, а в APK попадает его снимок на момент сборки. Ручной
      # синхронизации не нужно — CI сам кладёт свежую версию.
      - name: Copy index.html into assets (offline fallback)
        run: |
          mkdir -p app/src/main/assets
          cp index.html app/src/main/assets/index.html
          echo "index.html copied into assets:"
          ls -la app/src/main/assets/

      # keystore декодируется из base64-секрета. НЕТ google-services.json (Firebase не используем).
      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/planner.jks

      # Иконки приложения — копируем icon-192/512.png из корня репо в mipmap.
      - name: Copy icons to app res
        run: |
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          cp icon-192.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon-192.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon-512.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      # APK — для прямой установки на телефон (быстрый тест).
      - name: Build release APK
        run: gradle assembleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PATH: planner.jks
          KEY_ALIAS: planner
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      # AAB — для загрузки в Google Play.
      - name: Build release AAB
        run: gradle bundleRelease --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          KEYSTORE_PATH: planner.jks
          KEY_ALIAS: planner
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Find artifacts
        run: |
          echo "=== APK ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK found"
          echo "=== AAB ==="
          find . -name "*.aab" 2>/dev/null || echo "No AAB found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Planner-APK
          path: "**/*release*.apk"
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Planner-AAB
          path: "**/*release*.aab"
          retention-days: 30
