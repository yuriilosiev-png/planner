<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Planner — Tasks & Goals</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">

<style>
:root{
  --bg:#0f1115; --surface:#171a21; --surface2:#1f232c; --line:#2a2f3a;
  --txt:#e8eaed; --muted:#8b93a3; --accent:#5b9dff; --accent-dim:#1c3a63;
  --ok:#3ecf8e; --ok-dim:#143a2b; --warn:#ffb648; --danger:#ff5c5c; --danger-dim:#3a1818;
  --r:14px;
  /* category colors */
  --c-sport:#3ecf8e; --c-fin:#ffb648; --c-shop:#b98cff; --c-edu:#5b9dff; --c-other:#8b93a3;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.4; overflow:hidden;
  display:flex; flex-direction:column; height:100dvh;
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* Header */
.head{
  padding:14px 16px 10px; display:flex; align-items:baseline; justify-content:space-between;
  border-bottom:1px solid var(--line); flex-shrink:0;
}
.head h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.head .date{font-size:13px;color:var(--muted)}

/* Content */
.content{flex:1;overflow-y:auto;padding:12px 14px 90px;-webkit-overflow-scrolling:touch}
.screen{display:none}
.screen.active{display:block}

/* Task card */
.task{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  padding:13px 14px; margin-bottom:9px; position:relative;
  display:flex; align-items:flex-start; gap:11px; transition:.15s;
}
.task.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 18px rgba(91,157,255,.18)}
.task .cat-dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex-shrink:0}
.task .body{flex:1;min-width:0}
.task .ttl{font-size:15px;font-weight:500;word-break:break-word}
.task.done .ttl{text-decoration:line-through;color:var(--muted)}
.task .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.task .catname{padding:1px 7px;border-radius:6px;background:var(--surface2);font-size:11px}
.check{
  width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:transparent;transition:.15s;
}
.task.done .check{background:var(--ok);border-color:var(--ok);color:#06281b}

/* Action bar under selected task */
.actions{
  display:flex;gap:8px;margin:-3px 0 9px;padding:0 2px;flex-wrap:wrap;
  animation:slideDown .18s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.actions button{
  flex:1;min-width:fit-content;padding:11px 10px;border-radius:11px;font-size:14px;font-weight:600;
  background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:6px;
}
.actions button.ok{background:var(--ok-dim);border-color:var(--ok);color:var(--ok)}
.actions button.del{background:var(--danger-dim);border-color:var(--danger);color:var(--danger)}
.actions button.move{color:var(--accent);border-color:var(--accent-dim)}
.actions button.edit{color:var(--warn)}

/* Empty state */
.empty{text-align:center;color:var(--muted);padding:54px 20px;font-size:14px}
.empty .big{font-size:40px;margin-bottom:12px;opacity:.4}

/* Section title */
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 4px 9px}
.sec-title:first-child{margin-top:4px}

/* Goal card */
.goal{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:14px;margin-bottom:11px;
}
.goal .g-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.goal .g-name{font-size:16px;font-weight:600;word-break:break-word}
.goal .g-cat{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface2);flex-shrink:0;white-space:nowrap}
.goal .g-prog-txt{font-size:13px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between}
.goal .bar{height:7px;background:var(--surface2);border-radius:4px;margin-top:7px;overflow:hidden}
.goal .bar > i{display:block;height:100%;border-radius:4px;transition:width .4s}
.goal .g-info{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5}
.goal .g-del{font-size:13px;color:var(--danger);margin-top:11px;padding:6px 0}

/* Floating add button */
.fab{
  position:fixed;right:18px;bottom:78px;width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:30px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 22px rgba(91,157,255,.45);z-index:40;line-height:1;
}
.fab:active{transform:scale(.92)}

/* Bottom nav */
.nav{
  position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);
  border-top:1px solid var(--line);display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  color:var(--muted);font-size:10.5px;font-weight:600;position:relative;
}
.nav button .ic{font-size:21px;line-height:1}
.nav button.on{color:var(--accent)}
.nav button .badge{
  position:absolute;top:7px;right:50%;transform:translateX(18px);
  background:var(--danger);color:#fff;font-size:9px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;
}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);
}
.modal-bg.show{display:flex}
.modal{
  background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:90dvh;overflow-y:auto;
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.modal h2{font-size:18px;margin-bottom:16px;font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface2);border:1px solid var(--line);
  border-radius:11px;padding:12px 13px;color:var(--txt);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:flex;gap:10px}
.row2 .field{flex:1}
.days{display:flex;gap:6px;flex-wrap:wrap}
.days button{
  flex:1;min-width:38px;padding:9px 0;border-radius:9px;background:var(--surface2);
  border:1px solid var(--line);font-size:13px;font-weight:600;
}
.days button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.modal-btns button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700}
.modal-btns .primary{background:var(--accent);color:#fff}
.modal-btns .ghost{background:var(--surface2);border:1px solid var(--line)}
.hint{font-size:12px;color:var(--muted);margin-top:-7px;margin-bottom:13px;line-height:1.45}
.preview{background:var(--accent-dim);border:1px solid var(--accent);border-radius:11px;padding:11px 13px;font-size:13px;margin-bottom:14px;color:#cfe0ff;line-height:1.5;display:none}
.preview.show{display:block}

/* Category manager chips */
.cats-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cat-chip{
  display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--line);font-size:13px;
}
.cat-chip .dot{width:9px;height:9px;border-radius:50%}
.cat-chip .x{color:var(--muted);font-size:15px;padding:0 2px;line-height:1}
.add-cat-row{display:flex;gap:8px;margin-bottom:8px}
.catinput-wrap{
  flex:1;display:flex;align-items:center;gap:9px;padding:0 13px;
  background:var(--surface2);border:2px solid var(--line);border-radius:11px;transition:border-color .2s;
}
.catinput-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;transition:background .2s}
.catinput-wrap input{flex:1;background:none;border:none;padding:11px 0;color:var(--txt)}
.catinput-wrap input:focus{outline:none}
.add-cat-btn{padding:0 18px;border-radius:11px;color:#fff;font-weight:700;font-size:20px;transition:background .2s}
.swatches{display:flex;gap:7px;margin:10px 0 4px;flex-wrap:wrap}
.swatch{width:30px;height:30px;border-radius:50%;border:2px solid transparent}
.swatch.on{border-color:var(--txt)}

/* History group */
.hist-day{font-size:12px;font-weight:700;color:var(--muted);margin:16px 4px 8px;letter-spacing:.3px}
.hist-item{
  background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;
}
.hist-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-item .ht{flex:1;font-size:14px;color:var(--muted);text-decoration:line-through}
.hist-item .hc{font-size:11px;color:var(--muted)}

.toast{
  position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--line);color:var(--txt);
  padding:11px 18px;border-radius:12px;font-size:14px;z-index:200;opacity:0;
  transition:.25s;pointer-events:none;box-shadow:0 6px 24px rgba(0,0,0,.4);max-width:90%;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Header right + gear */
.head-right{display:flex;align-items:center;gap:10px}
.gear{font-size:20px;padding:4px;line-height:1;border-radius:8px}
.gear:active{transform:scale(.9)}

/* Theme modal */
.th-tabs{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0 16px}
.th-tab{
  padding:8px 11px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);
  font-size:13px;font-weight:600;
}
.th-tab.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.th-preview{
  height:74px;border-radius:14px;margin-bottom:16px;display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(255,255,255,.12);transition:background .25s;
}
.th-prev-card{
  background:rgba(255,255,255,.85);color:#222;padding:8px 16px;border-radius:9px;
  font-size:13px;font-weight:600;box-shadow:0 2px 10px rgba(0,0,0,.18);
}
.th-label{display:block;font-size:13px;color:var(--muted);font-weight:600;margin-bottom:9px}
.th-label span{color:var(--accent)}
.hues{display:flex;flex-wrap:wrap;gap:10px}
.hue-dot{
  width:34px;height:34px;border-radius:50%;border:3px solid transparent;transition:.15s;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
}
.hue-dot.on{border-color:var(--txt);transform:scale(1.12)}
.slider{
  -webkit-appearance:none;width:100%;height:8px;border-radius:5px;outline:none;
  background:linear-gradient(90deg,#fff,var(--accent));margin:2px 0 6px;
}
.slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;
  border:2px solid var(--accent);box-shadow:0 2px 8px rgba(0,0,0,.3);cursor:pointer;
}
.slider::-moz-range-thumb{
  width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--accent);cursor:pointer;
}
.slider-ends{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px}
</style>
</head>
<body>

<div class="head">
  <h1 id="screenTitle">Сегодня</h1>
  <div class="head-right">
    <div class="date" id="todayDate"></div>
    <button class="gear" onclick="openThemeModal()" aria-label="Настройки">⚙️</button>
  </div>
</div>

<div class="content">
  <!-- SCREEN 1: TODAY -->
  <div class="screen active" id="s-today"></div>

  <!-- SCREEN 2: GOALS -->
  <div class="screen" id="s-goals"></div>

  <!-- SCREEN 3: UNFINISHED -->
  <div class="screen" id="s-undone"></div>

  <!-- SCREEN 4: HISTORY -->
  <div class="screen" id="s-history"></div>
</div>

<button class="fab" id="fab" onclick="onFab()">+</button>

<div class="nav">
  <button class="on" data-screen="today" onclick="switchScreen('today')">
    <span class="ic">✅</span><span>Сегодня</span>
  </button>
  <button data-screen="goals" onclick="switchScreen('goals')">
    <span class="ic">🎯</span><span>Цели</span>
  </button>
  <button data-screen="undone" onclick="switchScreen('undone')">
    <span class="ic">⏰</span><span>Незавершённые</span>
    <span class="badge" id="undoneBadge" style="display:none">0</span>
  </button>
  <button data-screen="history" onclick="switchScreen('history')">
    <span class="ic">📚</span><span>История</span>
  </button>
</div>

<!-- MODAL: generic -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   ПЛАНЕР — каркас. Хранение в localStorage (работает на GitHub Pages).
   ============================================================ */

const DEFAULT_CATS = [
  {id:'sport',  name:'Спорт',      color:'#3ecf8e'},
  {id:'fin',    name:'Финансы',    color:'#ffb648'},
  {id:'shop',   name:'Покупки',    color:'#b98cff'},
  {id:'edu',    name:'Образование',color:'#5b9dff'},
];
const SWATCH_COLORS = ['#3ecf8e','#ffb648','#b98cff','#5b9dff','#ff7eb6','#ff5c5c','#6ee7e7','#a3e635','#fb923c','#94a3b8'];
const WEEKDAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс']; // index 0=Mon
const DOW_MAP = [6,0,1,2,3,4,5]; // JS getDay()=0(Sun) -> our index

/* ---------- State ---------- */
let state = {
  cats: [],
  goals: [],      // {id,name,catId,start,target,unit,deadline,days:[0..6],created,createdDate}
  tasks: [],      // {id,date:'YYYY-MM-DD',title,catId,goalId|null,done,manual,segmentVal|null}
  lastGen: null,  // last date we auto-generated for
  themes: null,   // {today:{hue,sat}, goals:{...}, undone:{...}, history:{...}}
};
let selectedTaskId = null;

// Дефолтные темы экранов: hue (оттенок 0-360), sat (насыщенность 0-100; 0=почти белый/серый)
const DEFAULT_THEMES = {
  today:   {hue:222, sat:14},
  goals:   {hue:152, sat:14},
  undone:  {hue:30,  sat:14},
  history: {hue:265, sat:14},
};

/* ---------- Persistence ---------- */
function load(){
  try{
    const raw = localStorage.getItem('planner_v1');
    if(raw){ state = JSON.parse(raw); }
  }catch(e){}
  if(!state.cats || !state.cats.length) state.cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
  if(!state.goals) state.goals = [];
  if(!state.tasks) state.tasks = [];
  if(!state.themes) state.themes = JSON.parse(JSON.stringify(DEFAULT_THEMES));
  // подстраховка: если в сохранёнке нет какого-то экрана
  for(const k in DEFAULT_THEMES){ if(!state.themes[k]) state.themes[k]=Object.assign({},DEFAULT_THEMES[k]); }
}
function save(){
  try{ localStorage.setItem('planner_v1', JSON.stringify(state)); }catch(e){}
}

/* ---------- Date helpers ---------- */
function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtDateHuman(s){
  const [y,m,d]=s.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const wd=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'][dt.getDay()];
  const mo=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'][m-1];
  return wd+', '+d+' '+mo;
}
function dowIndex(s){ const [y,m,d]=s.split('-').map(Number); return DOW_MAP[new Date(y,m-1,d).getDay()]; }
function addDays(s,n){ const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n); return todayStr(dt); }
function daysBetween(a,b){ const [y1,m1,d1]=a.split('-').map(Number),[y2,m2,d2]=b.split('-').map(Number); return Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000); }

/* ---------- ID ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ============================================================
   SEGMENT ENGINE — разбивка цели на ежедневные фрагменты
   ============================================================
   Логика: от start к target за период (created..deadline),
   считаем только активные дни недели (days[]).
   Текущая целевая величина на дату = линейная интерполяция
   по количеству активных дней, прошедших с начала.
*/
function activeDaysCount(fromDate, toDate, days){
  if(daysBetween(fromDate,toDate) < 0) return 0;
  let cnt=0, cur=fromDate;
  let guard=0;
  while(daysBetween(cur,toDate) >= 0 && guard<4000){
    if(days.includes(dowIndex(cur))) cnt++;
    cur = addDays(cur,1); guard++;
  }
  return cnt;
}
/* СТУПЕНЧАТЫЙ режим:
   держим значение N активных дней, потом +1 (или -1) до цели.
   Интервал ступени считается АВТО: всего активных дней / число ступеней.
   Пример: 20→40 (20 ступеней) за полгода Пн-Сб → ступень каждые ~9 активных дней.
*/
function stepPlan(start, target, totalActive){
  const steps = Math.abs(target - start);          // сколько ступеней (по 1 единице)
  if(steps===0 || totalActive<=0) return {interval:totalActive||1, steps:0, dir:0};
  const interval = Math.max(1, Math.round(totalActive / steps)); // дней держим одно значение
  const dir = target>start ? 1 : -1;
  return {interval, steps, dir};
}
// Целевое значение на конкретный активный день date
function goalValueForDate(goal, date){
  if(!goal.days.includes(dowIndex(date))) return null; // не активный день
  const totalActive = activeDaysCount(goal.createdDate, goal.deadline, goal.days);
  if(totalActive<=0) return Math.round(goal.target);
  const doneActive = activeDaysCount(goal.createdDate, date, goal.days); // включая сегодня, 1-based
  const {interval, dir} = stepPlan(goal.start, goal.target, totalActive);
  // если это последний активный день (или дальше) — показываем точную цель
  if(doneActive >= totalActive) return Math.round(goal.target);
  // сколько полных ступеней прошло к этому дню
  const stepIndex = Math.floor((doneActive-1) / interval);
  let val = Math.round(goal.start) + dir*stepIndex;
  if(dir>0) val = Math.min(val, Math.round(goal.target));
  else      val = Math.max(val, Math.round(goal.target));
  return val;
}
// Предпросмотр для формы
function previewStep(start,target,deadline,createdDate,days){
  if(start===''||target===''||!deadline||!days.length) return null;
  start=Number(start); target=Number(target);
  if(isNaN(start)||isNaN(target)) return null;
  const totalActive = activeDaysCount(createdDate, deadline, days);
  if(totalActive<=0) return null;
  const {interval, steps, dir} = stepPlan(start, target, totalActive);
  return {totalActive, interval, steps, dir, span:target-start};
}

/* ============================================================
   DAILY GENERATION — создать сегодняшние задачи из целей
   ============================================================ */
function generateForDate(date){
  // не дублируем: для каждой цели максимум 1 авто-задача в день
  state.goals.forEach(g=>{
    const val = goalValueForDate(g, date);
    if(val===null) return; // не активный день
    const exists = state.tasks.some(t=>t.goalId===g.id && t.date===date);
    if(exists) return;
    const cat = state.cats.find(c=>c.id===g.catId);
    state.tasks.push({

/* ============================================================
   THEME ENGINE — фон на экран + авто-контраст
   ============================================================
   sat: 0   -> почти белый фон (светлая тема, тёмный текст)
   sat: 100 -> насыщенный цветной фон
   Яркость фона ведём от очень светлой (sat низкий) к более тёмной/цветной.
*/
function hslToRgb(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(255*f(0)),Math.round(255*f(8)),Math.round(255*f(4))];
}
function luminance(r,g,b){
  // относительная яркость для решения тёмный/светлый текст
  const a=[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);});
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}
function applyTheme(name){
  const t=(state.themes&&state.themes[name])||DEFAULT_THEMES[name];
  const hue=t.hue, sat=t.sat;
  // Светлота фона: при sat=0 фон очень светлый (97%), при sat=100 — насыщенный средне-тёмный (38%)
  const bgL = 97 - (sat/100)*59;        // 97% -> 38%
  const [r,g,b]=hslToRgb(hue,sat,bgL);
  const lum=luminance(r,g,b);
  const dark = lum < 0.42;              // тёмный фон?

  const root=document.documentElement.style;
  root.setProperty('--bg', `rgb(${r},${g},${b})`);

  if(dark){
    // тёмный фон -> светлый текст, тёмные карточки
    const sL=Math.min(bgL+7,30), s2L=Math.min(bgL+12,36), lnL=Math.min(bgL+18,46);
    root.setProperty('--surface', `hsl(${hue},${Math.min(sat,40)}%,${sL}%)`);
    root.setProperty('--surface2',`hsl(${hue},${Math.min(sat,40)}%,${s2L}%)`);
    root.setProperty('--line',    `hsl(${hue},${Math.min(sat,40)}%,${lnL}%)`);
    root.setProperty('--txt',  '#eef0f4');
    root.setProperty('--muted','rgba(238,240,244,0.55)');
  }else{
    // светлый фон -> тёмный текст, светлые карточки
    root.setProperty('--surface', `hsl(${hue},${Math.min(sat,45)}%,${Math.max(bgL-4,90)}%)`);
    root.setProperty('--surface2',`hsl(${hue},${Math.min(sat,45)}%,${Math.max(bgL-9,84)}%)`);
    root.setProperty('--line',    `hsl(${hue},${Math.min(sat,45)}%,${Math.max(bgL-16,76)}%)`);
    root.setProperty('--txt',  '#15181d');
    root.setProperty('--muted','rgba(21,24,29,0.55)');
  }
}

function saveTask(id){
  const title=document.getElementById('tk-title').value.trim();

  const date=document.getElementById('tk-date').value;

function toggleDay(i){
  if(goalDays.includes(i)) goalDays=goalDays.filter(x=>x!==i);
  else goalDays.push(i);
  document.querySelectorAll('#g-days button').forEach(b=>{
    b.classList.toggle('on', goalDays.includes(Number(b.dataset.d)));
  });
  updatePreview();
}
function updatePreview(){
  const start=document.getElementById('g-start').value;
  const target=document.getElementById('g-target').value;
  const deadline=document.getElementById('g-deadline').value;
  const unit=document.getElementById('g-unit').value;
  const p=previewStep(start,target,deadline,todayStr(),goalDays);
  const el=document.getElementById('g-preview');
  if(!p){ el.classList.remove('show'); return; }
  el.classList.add('show');
  if(p.steps===0){
    el.innerHTML = `📊 Старт и цель равны — фрагмент будет постоянным: <b>${Math.round(Number(start))}${unit?(' '+unit):''}</b> каждый активный день.`;
    return;
  }
  const dir = p.dir>0?'+1':'−1';
  const u = unit?(' '+unit):'';
  const intWeeks = (p.interval/ ( [...new Set(goalDays)].length || 1 )).toFixed(1);
  el.innerHTML = `📊 Разбивка по ступеням: всего ${p.totalActive} активных дней, ${p.steps} ступеней. Держим значение <b>${p.interval} активных дней подряд</b>, затем <b>${dir}${u}</b> — и так до цели. Старт: ${Math.round(Number(start))}${u}.`;
}
function saveGoal(){
  const name=document.getElementById('g-name').value.trim();
  const catId=document.getElementById('g-cat').value;
  const start=Number(document.getElementById('g-start').value);
  const target=Number(document.getElementById('g-target').value);
  const unit=document.getElementById('g-unit').value.trim();
  const deadline=document.getElementById('g-deadline').value;
  if(!name){ toast('Введите название'); return; }
  if(isNaN(start)||isNaN(target)){ toast('Введите числа «сейчас» и «цель»'); return; }
  if(!deadline){ toast('Выберите дедлайн'); return; }
  if(!goalDays.length){ toast('Выберите хотя бы один день'); return; }
  if(daysBetween(todayStr(),deadline)<1){ toast('Дедлайн должен быть в будущем'); return; }
  const today=todayStr();
  state.goals.push({
    id:uid(), name, catId, start, target, unit,
    deadline, days:goalDays.slice(), created:Date.now(), createdDate:today
  });
  // сразу сгенерировать на сегодня, если сегодня активный день
  generateForDate(today);
  save(); closeModal(); render(); toast('Цель создана');
}

function pickColor(c){
  pickedColor=c;
  // подсветить выбранный свотч
  const cont=document.querySelector('.swatches');
  if(cont) cont.innerHTML = SWATCH_COLORS.map(col=>`<div class="swatch ${col===pickedColor?'on':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`).join('');
  // показать цвет на поле ввода
  const wrap=document.getElementById('catWrap');
  const dot=document.getElementById('catDot');
  const btn=document.getElementById('catAddBtn');
  if(wrap) wrap.style.borderColor=c;
  if(dot) dot.style.background=c;
  if(btn) btn.style.background=c;
}
function addCat(){
  const name=document.getElementById('newcat').value.trim();
  if(!name){ toast('Введите название'); return; }
  const id='c'+uid();
  state.cats.push({id,name,color:pickedColor});
  save(); renderCatModal(); render();
}
function removeCat(id){
  if(state.cats.length<=1){ toast('Нужна хотя бы одна категория'); return; }
  const used = state.goals.some(g=>g.catId===id) || state.tasks.some(t=>t.catId===id);
  if(used){ toast('Категория используется — нельзя удалить'); return; }
  state.cats=state.cats.filter(c=>c.id!==id);
  save(); renderCatModal(); render();
}
function backToGoal(){
  closeModal();
  openGoalModal();
}

/* ============================================================
   THEME MODAL — фон для каждого экрана
   ============================================================ */
const SCREEN_LIST=[
  {id:'today',  name:'Сегодня', emoji:'✅'},
  {id:'goals',  name:'Цели', emoji:'🎯'},
  {id:'undone', name:'Незавершённые', emoji:'⏰'},
  {id:'history',name:'История', emoji:'📚'},
];
const HUE_PRESETS=[222,152,30,265,0,200,48,320,108,15]; // синий, зелёный, оранж, фиолет, красный, голубой, жёлтый, розовый, лайм, кирпич
let themeEditScreen='today';
function openThemeModal(){
  themeEditScreen=curScreen||'today';
  renderThemeModal();
}
function renderThemeModal(){
  const tabs=SCREEN_LIST.map(s=>`<button class="th-tab ${s.id===themeEditScreen?'on':''}" onclick="themeTab('${s.id}')">${s.emoji} ${s.name}</button>`).join('');
  const t=state.themes[themeEditScreen];
  const hues=HUE_PRESETS.map(h=>{
    const [r,g,b]=hslToRgb(h,70,50);
    const on = Math.abs(h-t.hue)<6 ? 'on':'';
    return `<div class="hue-dot ${on}" style="background:rgb(${r},${g},${b})" onclick="setHue(${h})"></div>`;
  }).join('');
  // превью текущего фона
  const bgL=97-(t.sat/100)*59;
  const [pr,pg,pb]=hslToRgb(t.hue,t.sat,bgL);
  showModal(`
    <h2>⚙️ Фон экранов</h2>
    <div class="hint">Свой цвет и насыщенность для каждого экрана. Текст подстраивается автоматически.</div>
    <div class="th-tabs">${tabs}</div>

    <div class="th-preview" id="thPrev" style="background:rgb(${pr},${pg},${pb})">
      <span class="th-prev-card">Пример карточки</span>
    </div>

    <label class="th-label">Цвет</label>
    <div class="hues">${hues}</div>

    <label class="th-label" style="margin-top:16px">Насыщенность <span id="satVal">${t.sat}%</span></label>
    <input type="range" min="0" max="100" value="${t.sat}" class="slider" id="satSlider" oninput="setSat(this.value)">
    <div class="slider-ends"><span>Белый</span><span>Насыщенный</span></div>

    <div class="modal-btns" style="margin-top:18px">
      <button class="ghost" onclick="resetThemeScreen()">Сбросить</button>
      <button class="primary" onclick="closeModal()">Готово</button>
    </div>
  `);
}
function themeTab(id){ themeEditScreen=id; renderThemeModal(); }
function setHue(h){
  state.themes[themeEditScreen].hue=h;
  save();
  updateThemePreview();
  if(themeEditScreen===curScreen) applyTheme(curScreen);
}
function setSat(v){
  v=Number(v);
  state.themes[themeEditScreen].sat=v;
  document.getElementById('satVal').textContent=v+'%';
  save();
  updateThemePreview();
  if(themeEditScreen===curScreen) applyTheme(curScreen);
}
function updateThemePreview(){
  const t=state.themes[themeEditScreen];
  const bgL=97-(t.sat/100)*59;
  const [r,g,b]=hslToRgb(t.hue,t.sat,bgL);
  const prev=document.getElementById('thPrev');
  if(prev) prev.style.background=`rgb(${r},${g},${b})`;
  // подсветить выбранный hue
  document.querySelectorAll('.hue-dot').forEach((el,i)=>{
    el.classList.toggle('on', Math.abs(HUE_PRESETS[i]-t.hue)<6);
  });
}
function resetThemeScreen(){
  state.themes[themeEditScreen]=Object.assign({},DEFAULT_THEMES[themeEditScreen]);
  save();
  if(themeEditScreen===curScreen) applyTheme(curScreen);
  renderThemeModal();
  toast('Сброшено');
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  load();
  // авто-генерация на сегодня при каждом открытии (если ещё не делали сегодня)
  runDailyGen();
  switchScreen('today');
  render();
}
init();

// при возврате на вкладку — проверить, не сменился ли день
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    if(state.lastGen!==todayStr()){ runDailyGen(); render(); }
  }
});

// Register service worker (PWA / offline). Safe to ignore on file://
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
