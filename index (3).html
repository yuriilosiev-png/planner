/* ============================================================
   THEME ENGINE — фон на экран + авто-контраст
   ============================================================
   sat: 0   -> почти белый фон (светлая тема, тёмный текст)
   sat: 100 -> насыщенный цветной фон
   Яркость фона ведём от очень светлой (sat низкий) к более тёмной/цветной.
*/
function hslToRgb(h,s,l){
  s/=100; l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  return [Math.round(255*f(0)),Math.round(255*f(8)),Math.round(255*f(4))];
}
function luminance(r,g,b){
  // относительная яркость для решения тёмный/светлый текст
  const a=[r,g,b].map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);});
  return 0.2126*a[0]+0.7152*a[1]+0.0722*a[2];
}
// вспомогательные: ограничение и линейная интерполяция
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }
function lerp(a,b,t){ return a+(b-a)*t; }
// плавный шаг (smoothstep) между edge0 и edge1 -> 0..1
function smoothstep(edge0,edge1,x){
  const t=clamp((x-edge0)/(edge1-edge0),0,1);
  return t*t*(3-2*t);
}
// смешать два rgb-массива по t (0..1)
function mixRgb(c1,c2,t){
  return [Math.round(lerp(c1[0],c2[0],t)),Math.round(lerp(c1[1],c2[1],t)),Math.round(lerp(c1[2],c2[2],t))];
}
function applyTheme(name){
  const t=(state.themes&&state.themes[name])||DEFAULT_THEMES[name];
  const hue=t.hue, sat=t.sat;
  // Светлота фона: плавно от очень светлой (sat0=97%) к тёмной (sat100=48%).
  // Не проходит через «мёртвую» серую зону резко — тон меняется равномерно.
  const bgL = 97 - (sat/100)*49;        // 97% -> 48%
  const [r,g,b]=hslToRgb(hue,sat,bgL);

  const root=document.documentElement.style;
  root.setProperty('--bg', `rgb(${r},${g},${b})`);

  // ----- ТЕКСТ: чёрный, и только на самых тёмных фонах — белый -----
  // Резкое переключение в одной точке, привязанное к ФАКТИЧЕСКОЙ яркости фона
  // (luminance), а не к проценту — иначе для ярких тонов (жёлтый/зелёный) порог
  // сработал бы не там. Точка ~0.16 — где чёрный и белый дают равный контраст.
  // Серую фазу не проходим => текст всегда читаем. Скачок текста допустим.
  const lum = luminance(r,g,b);
  const whiteText = lum < 0.16;
  if(whiteText){
    root.setProperty('--txt', '#eef0f4');
    root.setProperty('--muted', 'rgba(238,240,244,0.58)');
  }else{
    root.setProperty('--txt', '#15181d');
    root.setProperty('--muted', 'rgba(21,24,29,0.58)');
  }

  // ----- КАРТОЧКИ/ЛИНИИ: светлота смещается от фона ПЛАВНО (без бинарных веток) -----
  // d = «насколько фон тёмный» 0..1, плавно. На светлом фоне карточка темнее фона,
  // на тёмном — светлее; знак смещения меняется плавно => тон карточек непрерывен.
  const d = clamp((97 - bgL) / 49, 0, 1);   // 0 при светлом, 1 при тёмном
  const offSurface  = lerp(-6,  +9,  d);
  const offSurface2 = lerp(-11, +14, d);
  const offLine     = lerp(-17, +20, d);
  const sCap = Math.min(sat, 42);            // насыщенность карточек ограничиваем
  const sL  = clamp(bgL+offSurface,  8, 96);
  const s2L = clamp(bgL+offSurface2, 8, 96);
  const lnL = clamp(bgL+offLine,     8, 96);
  root.setProperty('--surface',  `hsl(${hue},${sCap}%,${sL}%)`);
  root.setProperty('--surface2', `hsl(${hue},${sCap}%,${s2L}%)`);
  root.setProperty('--line',     `hsl(${hue},${sCap}%,${lnL}%)`);
}

/* ============================================================
   FAB action — context aware
   ============================================================ */
function onFab(){
  if(curScreen==='goals') openGoalModal();
  else if(curScreen==='calendar') openEventModal(null);
  else openTaskModal(); // today -> add manual task
}

/* ============================================================
   MODALS
   ============================================================ */
function showModal(html){
  document.getElementById('modalBox').innerHTML=html;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });

/* ---- Task modal (add/edit manual task) ---- */
function openTaskModal(id){
  const editing = !!id;
  const t = editing ? state.tasks.find(x=>x.id===id) : null;
  const catsOpts = state.cats.map(c=>`<option value="${c.id}" ${t&&t.catId===c.id?'selected':''}>${esc(c.name)}</option>`).join('');
  showModal(`
    <h2>${editing?'Изменить задание':'Новое задание'}</h2>
    <div class="field">
      <label>Текст задания</label>
      <input id="tk-title" placeholder="Например: купить молоко" value="${t?esc(t.title):''}">
    </div>
    <div class="field">
      <label>Категория</label>
      <select id="tk-cat">${catsOpts}</select>
    </div>
    <div class="field">
      <label>Дата</label>
      <input type="date" id="tk-date" value="${t?t.date:todayStr()}">
    </div>
    <div class="modal-btns">
      <button class="ghost" onclick="closeModal()">Отмена</button>
      <button class="primary" onclick="saveTask(${editing?`'${id}'`:'null'})">${editing?'Сохранить':'Добавить'}</button>
    </div>
  `);
}
function saveTask(id){
  const title=document.getElementById('tk-title').value.trim();
  const catId=document.getElementById('tk-cat').value;
  const date=document.getElementById('tk-date').value;
  if(!title){ toast('Введите текст задания'); return; }
  if(!date){ toast('Выберите дату'); return; }
  if(id){
    const t=state.tasks.find(x=>x.id===id);
    t.title=title; t.catId=catId; t.date=date;
  }else{
    state.tasks.push({id:uid(),date,goalId:null,catId,title,done:false,manual:true,segmentVal:null});
  }
  selectedTaskId=null; save(); closeModal(); render(); toast(id?'Сохранено':'Добавлено');
}

/* ---- Move modal ---- */
function openMoveModal(id){
  const t=state.tasks.find(x=>x.id===id);
  const tomorrow=addDays(todayStr(),1);
  showModal(`
    <h2>Перенести задание</h2>
    <div class="hint">${esc(t.title)}</div>
    <div class="field">
      <label>Новая дата</label>
      <input type="date" id="mv-date" value="${tomorrow}">
    </div>
    <div class="modal-btns">
      <button class="ghost" onclick="closeModal()">Отмена</button>
      <button class="primary" onclick="doMove('${id}')">Перенести</button>
    </div>
  `);
}
function doMove(id){
  const date=document.getElementById('mv-date').value;
  if(!date){ toast('Выберите дату'); return; }
  const t=state.tasks.find(x=>x.id===id);
  t.date=date; t.done=false;
  selectedTaskId=null; save(); closeModal(); render(); toast('Перенесено на '+fmtShort(date));
}

/* ---- Goal modal (create + edit) — Stage 4 ---- */
let goalDays=[0,1,2,3,4,5]; // default Mon-Sat (numeric/manual)
let goalKind='numeric';     // numeric | checklist | manual
let goalType='physical';    // material | physical | learning | travel (метка/иконка)
let goalHasDeadline=false;  // Stage 4: включён ли дедлайн (для checklist/manual; numeric всегда true)
let goalDeadline='';        // строка YYYY-MM-DD когда дедлайн включён
let editGoalId=null;        // id редактируемой цели либо null
let wpDraft={0:[],1:[],2:[],3:[],4:[],5:[],6:[]}; // черновик недельного плана для checklist

function openGoalModal(id){
  const today=todayStr();
  if(id){
    const g=state.goals.find(x=>x.id===id);
    if(!g){ return; }
    editGoalId=id;
    goalKind=g.kind||'numeric';
    goalType=g.type||'physical';
    goalDays=(g.days&&g.days.length)?g.days.slice():[0,1,2,3,4,5];
    goalHasDeadline=!!g.deadline;
    goalDeadline=g.deadline||addDays(today,180);
    gName=g.name||'';
    gCat=g.catId||'';
    gVision=g.vision||'';
    gFactValue=(g.factValue===null||g.factValue===undefined)?'':String(g.factValue);
    // черновик недельного плана из существующей цели
    wpDraft={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
    if(g.weeklyPlan){ for(let i=0;i<7;i++){ wpDraft[i]=(g.weeklyPlan[i]||[]).map(it=>({text:it.text})); } }
  }else{
    editGoalId=null;
    goalDays=[0,1,2,3,4,5];
    goalKind='numeric';
    goalType='physical';
    goalHasDeadline=false;
    goalDeadline=addDays(today,180);
    gName=''; gCat=''; gVision=''; gFactValue='';
    wpDraft={0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
  }
  renderGoalModal();
}
function setGoalKind(k){
  // при редактировании kind не меняем (чтобы не ломать данные), смена только для новой цели
  if(editGoalId) return;
  goalKind=k;
  renderGoalModal();
}
function setGoalType(t){
  goalType=t;
  document.querySelectorAll('.type-switch button').forEach(b=>{
    b.classList.toggle('on', b.dataset.t===t);
  });
}
function setGoalDeadlineOn(on){
  syncGoalInputsBeforeRerender();
  goalHasDeadline=on;
  renderGoalModal();
}
// перед перерисовкой модалки — сохранить значения текущих инпутов в кэш
function syncGoalInputsBeforeRerender(){
  const nm=document.getElementById('g-name'); if(nm) gName=nm.value;
  const ct=document.getElementById('g-cat'); if(ct) gCat=ct.value;
  const vs=document.getElementById('g-vision'); if(vs) gVision=vs.value;
  const fv=document.getElementById('g-fact'); if(fv) gFactValue=fv.value;
  const dl=document.getElementById('g-deadline'); if(dl) goalDeadline=dl.value;
  if(goalKind==='checklist') syncWpInputs();
}
function renderGoalModal(){
  const catsOpts = state.cats.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('');
  const today=todayStr();
  const maxDl=maxDeadline(today);
  const ks=(k,label,emoji)=>`<button type="button" class="${goalKind===k?'on':''}" ${editGoalId?'disabled style="opacity:.5"':''} onclick="setGoalKind('${k}')"><span class="ki">${emoji}</span>${label}</button>`;
  const ts=GOAL_TYPES.map(t=>`<button type="button" class="${goalType===t.id?'on':''}" data-t="${t.id}" onclick="setGoalType('${t.id}')"><span class="ti">${t.emoji}</span>${t.label}</button>`).join('');
  const namePh=(GOAL_TYPES.find(t=>t.id===goalType)||{}).ph||'Название цели';

  // --- блок дедлайна (общий для всех типов) ---
  // numeric: дедлайн обязателен (всегда показываем поле даты).
  // checklist/manual: дедлайн опционален (переключатель).
  let deadlineBlock='';
  if(goalKind==='numeric'){
    deadlineBlock=`
    <div class="field">
      <label>Дедлайн <span style="color:var(--muted);font-weight:400">(до 5 лет)</span></label>
      <input type="date" id="g-deadline" value="${goalDeadline}" max="${maxDl}" min="${today}" oninput="updatePreview()">
    </div>`;
  }else{
    deadlineBlock=`
    <div class="ev-alert-row" style="margin-bottom:${goalHasDeadline?'10px':'14px'}">
      <span class="ea-label">📅 Дедлайн</span>
      <label class="switch"><input type="checkbox" id="g-dl-on" ${goalHasDeadline?'checked':''} onchange="setGoalDeadlineOn(this.checked)"><span class="sl"></span></label>
    </div>
    ${goalHasDeadline?`
    <div class="field">
      <label>Дата дедлайна <span style="color:var(--muted);font-weight:400">(до 5 лет)</span></label>
      <input type="date" id="g-deadline" value="${goalDeadline}" max="${maxDl}" min="${today}">
    </div>`:''}`;
  }

  // секция в зависимости от типа
  let body='';
  if(goalKind==='numeric'){
    const sg=state.goals.find(x=>x.id===editGoalId);
    const unitVal=editGoalId&&sg?((sg.numeric&&sg.numeric.unit)||sg.unit||''):'';
    const startVal=editGoalId&&sg?sg.start:'';
    const targetVal=editGoalId&&sg?sg.target:'';
    // поле «текущий факт» (Stage 4) — только при редактировании имеет смысл,
    // но показываем и при создании (можно сразу задать стартовый факт)
    const factBlock=`
    <div class="fact-row">
      <div class="fr-label">📍 Текущее значение (факт)</div>
      <div class="fr-inputs">
        <div class="field"><input type="number" id="g-fact" placeholder="сколько сейчас по факту" value="${esc(gFactValue)}"></div>
      </div>
      <div class="fr-hint">Введи, чего реально достиг сегодня. Приложение сравнит с планом и покажет — идёшь с опережением или отстаёшь. Дата ввода запомнится.</div>
    </div>`;
    body=`
    <div class="row2">
      <div class="field"><label>Сейчас</label><input type="number" id="g-start" placeholder="20" value="${startVal}" oninput="updatePreview()"></div>
      <div class="field"><label>Цель</label><input type="number" id="g-target" placeholder="40" value="${targetVal}" oninput="updatePreview()"></div>
      <div class="field"><label>Ед. (необяз.)</label><input id="g-unit" placeholder="раз" value="${esc(unitVal)}" oninput="updatePreview()"></div>
    </div>
    ${deadlineBlock}
    <div class="field">
      <label>Дни выполнения</label>
      <div class="days" id="g-days">
        ${WEEKDAYS.map((d,i)=>`<button type="button" class="${goalDays.includes(i)?'on':''}" data-d="${i}" onclick="toggleDay(${i})">${d}</button>`).join('')}
      </div>
    </div>
    ${factBlock}
    <div class="preview" id="g-preview"></div>`;
  } else if(goalKind==='checklist'){
    body=`
    <div class="hint">Задай набор подпунктов на каждый день недели. В этот день недели они появятся в «Сегодня» чек-листом. Цвет дня считается сам: всё ✓ — 🟢, больше половины — 🟡, меньше — 🌸.</div>
    <div id="wp-editor">${weeklyEditorHTML()}</div>
    ${deadlineBlock}`;
  } else { // manual
    body=`
    <div class="hint">Ежедневная цель без подпунктов. В «Сегодня» отмечаешь статус сам: 🟢 выучил · 🟡 доучить · 🌸 повторить. Удобно для языка, чтения и т.п.</div>
    <div class="field">
      <label>Дни</label>
      <div class="days" id="g-days">
        ${WEEKDAYS.map((d,i)=>`<button type="button" class="${goalDays.includes(i)?'on':''}" data-d="${i}" onclick="toggleDay(${i})">${d}</button>`).join('')}
      </div>
    </div>
    ${deadlineBlock}`;
  }

  const isEdit=!!editGoalId;
  showModal(`
    <h2>${isEdit?'Изменить цель':'Новая цель'}</h2>
    <div class="field">
      <label>Название цели</label>
      <input id="g-name" placeholder="${esc(namePh)}" value="${esc(gName)}" oninput="cacheGName(this.value)">
    </div>
    <div class="field">
      <label>Категория</label>
      <select id="g-cat">${catsOpts}</select>
    </div>
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:600">Что за цель</label>
    <div class="type-switch">${ts}</div>
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:8px;font-weight:600">Тип цели${isEdit?' <span style="font-weight:400">(нельзя изменить)</span>':''}</label>
    <div class="kind-switch">
      ${ks('numeric','Число','📊')}
      ${ks('checklist','Чек-лист','✅')}
      ${ks('manual','Статус','📖')}
    </div>
    ${body}
    <div class="field">
      <label>Видение (необяз.)</label>
      <textarea id="g-vision" placeholder="Зачем эта цель, как будет, что почувствую…" oninput="cacheGVision(this.value)">${esc(gVision)}</textarea>
    </div>
    <div class="modal-btns">
      <button class="ghost" onclick="closeGoalModal()">Отмена</button>
      <button class="primary" onclick="saveGoal()">${isEdit?'Сохранить':'Создать цель'}</button>
    </div>
  `);
  // восстановить выбранную категорию
  if(gCat){ const sel=document.getElementById('g-cat'); if(sel) sel.value=gCat; }
  if(goalKind==='numeric') updatePreview();
}
// кэш названия/категории/факта между перерисовками модалки
let gName='', gCat='', gVision='', gFactValue='';
function cacheGName(v){ gName=v; }
function cacheGVision(v){ gVision=v; }
function closeGoalModal(){ gName=''; gCat=''; gVision=''; gFactValue=''; editGoalId=null; closeModal(); }

// HTML редактора недельного плана (checklist)
function weeklyEditorHTML(){
  return WEEKDAYS.map((dname,i)=>{
    const items=wpDraft[i]||[];
    const on=items.length>0;
    const itemsHTML=items.map((it,idx)=>`
      <div class="wp-item">
        <input value="${esc(it.text)}" placeholder="Упражнение / задание" oninput="wpEdit(${i},${idx},this.value)">
        <span class="wp-del" onclick="wpRemove(${i},${idx})">✕</span>
      </div>`).join('');
    return `
    <div class="wp-day${on?'':' off'}">
      <div class="wp-day-head">
        <span class="wp-day-name">${dname}</span>
        <span class="wp-day-count">${items.length?items.length+' зад.':'выходной'}</span>
      </div>
      ${itemsHTML}
      <div class="wp-add" onclick="wpAdd(${i})">＋ добавить задание</div>
    </div>`;
  }).join('');
}
function refreshWpEditor(){
  const ed=document.getElementById('wp-editor');
  if(ed) ed.innerHTML=weeklyEditorHTML();
}
function wpAdd(day){
  syncWpInputs();
  wpDraft[day]=wpDraft[day]||[];
  wpDraft[day].push({text:''});
  refreshWpEditor();
}
function wpRemove(day,idx){
  syncWpInputs();
  wpDraft[day].splice(idx,1);
  refreshWpEditor();
}
function wpEdit(day,idx,val){
  if(wpDraft[day] && wpDraft[day][idx]) wpDraft[day][idx].text=val;
}
// считать значения всех инпутов редактора обратно в wpDraft (перед перерисовкой)
function syncWpInputs(){
  const ed=document.getElementById('wp-editor');
  if(!ed) return;
  const days=ed.querySelectorAll('.wp-day');
  days.forEach((dayEl,i)=>{
    const inputs=dayEl.querySelectorAll('.wp-item input');
    wpDraft[i]=Array.from(inputs).map(inp=>({text:inp.value}));
  });
}
function toggleDay(i){
  if(goalDays.includes(i)) goalDays=goalDays.filter(x=>x!==i);
  else goalDays.push(i);
  document.querySelectorAll('#g-days button').forEach(b=>{
    b.classList.toggle('on', goalDays.includes(Number(b.dataset.d)));
  });
  updatePreview();
}
function updatePreview(){
  const sEl=document.getElementById('g-start'); if(!sEl) return;
  const start=sEl.value;
  const target=document.getElementById('g-target').value;
  const dlEl=document.getElementById('g-deadline');
  const deadline=dlEl?dlEl.value:goalDeadline;
  const unit=document.getElementById('g-unit').value;
  const p=previewStep(start,target,deadline,todayStr(),goalDays);
  const el=document.getElementById('g-preview');
  if(!el) return;
  if(!p){ el.classList.remove('show'); return; }
  el.classList.add('show');
  if(p.steps===0){
    el.innerHTML = `📊 Старт и цель равны — фрагмент будет постоянным: <b>${Math.round(Number(start))}${unit?(' '+unit):''}</b> каждый активный день.`;
    return;
  }
  const dir = p.dir>0?'+1':'−1';
  const u = unit?(' '+unit):'';
  el.innerHTML = `📊 Разбивка по ступеням: всего ${p.totalActive} активных дней, ${p.steps} ступеней. Держим значение <b>${p.interval} активных дней подряд</b>, затем <b>${dir}${u}</b> — и так до цели. Старт: ${Math.round(Number(start))}${u}.`;
}
function saveGoal(){
  const name=document.getElementById('g-name').value.trim();
  const catId=document.getElementById('g-cat').value;
  const visEl=document.getElementById('g-vision');
  const vision=visEl?visEl.value.trim():gVision.trim();
  if(!name){ toast('Введите название'); return; }
  const today=todayStr();

  // определить дедлайн
  let deadline=null;
  if(goalKind==='numeric'){
    const dlEl=document.getElementById('g-deadline');
    deadline=dlEl?dlEl.value:goalDeadline;
    if(!deadline){ toast('Выберите дедлайн'); return; }
    if(daysBetween(today,deadline)<1){ toast('Дедлайн должен быть в будущем'); return; }
    if(daysBetween(today,deadline)>daysBetween(today,maxDeadline(today))){ toast('Дедлайн не дальше 5 лет'); return; }
  }else{
    if(goalHasDeadline){
      const dlEl=document.getElementById('g-deadline');
      deadline=dlEl?dlEl.value:goalDeadline;
      if(!deadline){ toast('Выберите дату дедлайна или выключите дедлайн'); return; }
      if(daysBetween(today,deadline)<1){ toast('Дедлайн должен быть в будущем'); return; }
      if(daysBetween(today,deadline)>daysBetween(today,maxDeadline(today))){ toast('Дедлайн не дальше 5 лет'); return; }
    }
  }

  if(goalKind==='numeric'){
    const start=Number(document.getElementById('g-start').value);
    const target=Number(document.getElementById('g-target').value);
    const unit=document.getElementById('g-unit').value.trim();
    const factRaw=document.getElementById('g-fact')?document.getElementById('g-fact').value.trim():'';
    if(isNaN(start)||isNaN(target)){ toast('Введите числа «сейчас» и «цель»'); return; }
    if(!goalDays.length){ toast('Выберите хотя бы один день'); return; }

    // факт: если введён и валиден — сохраняем со сегодняшней датой (только если значение поменялось)
    let factValue=null, factDate=null;
    if(factRaw!==''){
      const fv=Number(factRaw);
      if(!isNaN(fv)){ factValue=fv; }
    }

    if(editGoalId){
      const g=state.goals.find(x=>x.id===editGoalId);
      if(g){
        g.name=name; g.catId=catId; g.type=goalType; g.vision=vision;
        g.start=start; g.target=target; g.unit=unit;
        g.numeric={start,target,unit};
        g.deadline=deadline; g.days=goalDays.slice();
        // факт: обновляем дату только если значение реально изменилось
        if(factValue!==null){
          const prev=(g.factValue===null||g.factValue===undefined)?null:Number(g.factValue);
          if(prev!==factValue){ g.factValue=factValue; g.factDate=today; }
        }else{
          g.factValue=null; g.factDate=null;
        }
      }
      toast('Цель обновлена');
    }else{
      if(factValue!==null){ factDate=today; }
      state.goals.push({
        id:uid(), name, catId, kind:'numeric', type:goalType, vision,
        start, target, unit, numeric:{start,target,unit},
        deadline, days:goalDays.slice(),
        factValue, factDate,
        weeklyPlan:{0:[],1:[],2:[],3:[],4:[],5:[],6:[]},
        created:Date.now(), createdDate:today
      });
      toast('Цель создана');
    }
  } else if(goalKind==='checklist'){
    syncWpInputs();
    const wp={}; let total=0;
    for(let i=0;i<7;i++){
      const items=(wpDraft[i]||[]).map(it=>({id:uid(),text:(it.text||'').trim()})).filter(it=>it.text);
      wp[i]=items; total+=items.length;
    }
    if(total===0){ toast('Добавьте хотя бы одно задание в неделю'); return; }
    if(editGoalId){
      const g=state.goals.find(x=>x.id===editGoalId);
      if(g){ g.name=name; g.catId=catId; g.type=goalType; g.vision=vision; g.weeklyPlan=wp; g.deadline=deadline; }
      toast('Цель обновлена');
    }else{
      state.goals.push({
        id:uid(), name, catId, kind:'checklist', type:goalType, vision,
        deadline, days:[0,1,2,3,4,5,6],
        factValue:null, factDate:null,
        weeklyPlan:wp, created:Date.now(), createdDate:today
      });
      toast('Цель создана');
    }
  } else { // manual
    if(!goalDays.length){ toast('Выберите хотя бы один день'); return; }
    if(editGoalId){
      const g=state.goals.find(x=>x.id===editGoalId);
      if(g){ g.name=name; g.catId=catId; g.type=goalType; g.vision=vision; g.days=goalDays.slice(); g.deadline=deadline; }
      toast('Цель обновлена');
    }else{
      state.goals.push({
        id:uid(), name, catId, kind:'manual', type:goalType, vision,
        deadline, days:goalDays.slice(),
        factValue:null, factDate:null,
        weeklyPlan:{0:[],1:[],2:[],3:[],4:[],5:[],6:[]},
        created:Date.now(), createdDate:today
      });
      toast('Цель создана');
    }
  }

  generateForDate(today);
  gName=''; gCat=''; gVision=''; gFactValue=''; editGoalId=null;
  save(); closeModal(); render();
}
function delGoal(id){
  showModal(`
    <h2>Удалить цель?</h2>
    <div class="hint">Сами задания, уже добавленные в дни, останутся. Будущие шаги генерироваться не будут.</div>
    <div class="modal-btns">
      <button class="ghost" onclick="closeModal()">Отмена</button>
      <button class="primary" style="background:var(--danger)" onclick="confirmDelGoal('${id}')">Удалить</button>
    </div>
  `);
}
function confirmDelGoal(id){
  state.goals=state.goals.filter(g=>g.id!==id);
  save(); closeModal(); render(); toast('Цель удалена');
}

/* ---- Stage 4: достижение цели (→ История) и перенос дедлайна ---- */
function achieveGoal(id){
  const g=state.goals.find(x=>x.id===id);
  if(!g) return;
  const today=todayStr();
  const unit=(g.numeric&&g.numeric.unit)||g.unit||'';
  state.achieved.push({
    id:g.id, name:g.name, catId:g.catId, type:g.type||'physical', kind:g.kind||'numeric',
    vision:g.vision||'', start:g.start, target:g.target, unit,
    createdDate:g.createdDate, deadline:g.deadline||null, achievedDate:today
  });
  state.goals=state.goals.filter(x=>x.id!==id);
  save(); render(); toast('Цель достигнута 🏆');
}
function extendGoal(id){
  const g=state.goals.find(x=>x.id===id);
  if(!g) return;
  const today=todayStr();
  const suggest=addDays(today,90);
  const maxDl=maxDeadline(today);
  showModal(`
    <h2>Перенести дедлайн</h2>
    <div class="hint">${typeEmoji(g.type)} ${esc(g.name)}<br>Текущий дедлайн: ${fmtFull(g.deadline)} (прошёл). Выбери новую дату — цель продолжит работать.</div>
    <div class="field">
      <label>Новый дедлайн <span style="color:var(--muted);font-weight:400">(до 5 лет)</span></label>
      <input type="date" id="ext-date" value="${suggest}" min="${addDays(today,1)}" max="${maxDl}">
    </div>
    <div class="modal-btns">
      <button class="ghost" onclick="closeModal()">Отмена</button>
      <button class="primary" onclick="doExtendGoal('${id}')">Перенести</button>
    </div>
  `);
}
function doExtendGoal(id){
  const g=state.goals.find(x=>x.id===id);
  if(!g) return;
  const today=todayStr();
  const dateEl=document.getElementById('ext-date');
  const date=dateEl?dateEl.value:'';
  if(!date){ toast('Выберите дату'); return; }
  if(daysBetween(today,date)<1){ toast('Дата должна быть в будущем'); return; }
  if(daysBetween(today,date)>daysBetween(today,maxDeadline(today))){ toast('Не дальше 5 лет'); return; }
  g.deadline=date;
  save(); closeModal(); render(); toast('Дедлайн перенесён на '+fmtFull(date));
}

/* ---- Category manager ---- */
let pickedColor=SWATCH_COLORS[0];
function openCatModal(){
  pickedColor=SWATCH_COLORS[0];
  renderCatModal();
}
function renderCatModal(){
  const chips=state.cats.map(c=>`
    <div class="cat-chip">
      <span class="dot" style="background:${c.color}"></span>
      ${esc(c.name)}
      <span class="x" onclick="removeCat('${c.id}')">✕</span>
    </div>`).join('');
  const swatches=SWATCH_COLORS.map(col=>`<div class="swatch ${col===pickedColor?'on':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`).join('');
  showModal(`
    <h2>Категории</h2>
    <div class="cats-row">${chips||'<span style="color:var(--muted);font-size:13px">Нет категорий</span>'}</div>
    <label style="display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600">Новая категория</label>
    <div class="add-cat-row">
      <div class="catinput-wrap" id="catWrap" style="border-color:${pickedColor}">
        <span class="catinput-dot" id="catDot" style="background:${pickedColor}"></span>
        <input id="newcat" placeholder="Название" maxlength="20">
      </div>
      <button class="add-cat-btn" style="background:${pickedColor}" id="catAddBtn" onclick="addCat()">＋</button>
    </div>
    <div class="swatches">${swatches}</div>
    <div class="hint" style="margin-top:6px">Выбери цвет — категория создастся в нём.</div>
    <div class="modal-btns" style="margin-top:14px">
      <button class="primary" onclick="backToGoal()">Готово</button>
    </div>
  `);
}
function pickColor(c){
  pickedColor=c;
  // подсветить выбранный свотч
  const cont=document.querySelector('.swatches');
  if(cont) cont.innerHTML = SWATCH_COLORS.map(col=>`<div class="swatch ${col===pickedColor?'on':''}" style="background:${col}" onclick="pickColor('${col}')"></div>`).join('');
  // показать цвет на поле ввода
  const wrap=document.getElementById('catWrap');
  const dot=document.getElementById('catDot');
  const btn=document.getElementById('catAddBtn');
  if(wrap) wrap.style.borderColor=c;
  if(dot) dot.style.background=c;
  if(btn) btn.style.background=c;
}
function addCat(){
  const name=document.getElementById('newcat').value.trim();
  if(!name){ toast('Введите название'); return; }
  const id='c'+uid();
  state.cats.push({id,name,color:pickedColor});
  save(); renderCatModal(); render();
}
function removeCat(id){
  if(state.cats.length<=1){ toast('Нужна хотя бы одна категория'); return; }
  const used = state.goals.some(g=>g.catId===id) || state.tasks.some(t=>t.catId===id);
  if(used){ toast('Категория используется — нельзя удалить'); return; }
  state.cats=state.cats.filter(c=>c.id!==id);
  save(); renderCatModal(); render();
}
function backToGoal(){
  closeModal();
  openGoalModal();
}

/* ============================================================
   THEME MODAL — фон для каждого экрана
   ============================================================ */
const SCREEN_LIST=[
  {id:'today',  name:'Сегодня', emoji:'✅'},
  {id:'goals',  name:'Цели', emoji:'🎯'},
  {id:'undone', name:'Незавершённые', emoji:'⏰'},
  {id:'history',name:'История', emoji:'📚'},
];
const HUE_PRESETS=[222,152,30,265,0,200,48,320,108,15]; // синий, зелёный, оранж, фиолет, красный, голубой, жёлтый, розовый, лайм, кирпич
let themeEditScreen='today';
function openThemeModal(){
  themeEditScreen=curScreen||'today';
  renderThemeModal();
}
function renderThemeModal(){
  const tabs=SCREEN_LIST.map(s=>`<button class="th-tab ${s.id===themeEditScreen?'on':''}" onclick="themeTab('${s.id}')">${s.emoji} ${s.name}</button>`).join('');
  const t=state.themes[themeEditScreen];
  const hues=HUE_PRESETS.map(h=>{
    const [r,g,b]=hslToRgb(h,70,50);
    const on = Math.abs(h-t.hue)<6 ? 'on':'';
    return `<div class="hue-dot ${on}" style="background:rgb(${r},${g},${b})" onclick="setHue(${h})"></div>`;
  }).join('');
  // превью текущего фона
  const bgL=97-(t.sat/100)*59;
  const [pr,pg,pb]=hslToRgb(t.hue,t.sat,bgL);
  showModal(`
    <h2>⚙️ Фон экранов</h2>
    <div class="hint">Свой цвет и насыщенность для каждого экрана. Текст подстраивается автоматически.</div>
    <div class="th-tabs">${tabs}</div>

    <div class="th-preview" id="thPrev" style="background:rgb(${pr},${pg},${pb})">
      <span class="th-prev-card">Пример карточки</span>
    </div>

    <label class="th-label">Цвет</label>
    <div class="hues">${hues}</div>

    <label class="th-label" style="margin-top:16px">Насыщенность <span id="satVal">${t.sat}%</span></label>
    <input type="range" min="0" max="100" value="${t.sat}" class="slider" id="satSlider" oninput="setSat(this.value)">
    <div class="slider-ends"><span>Белый</span><span>Насыщенный</span></div>

    <div class="modal-btns" style="margin-top:18px">
      <button class="ghost" onclick="resetThemeScreen()">Сбросить</button>
      <button class="primary" onclick="closeModal()">Готово</button>
    </div>
  `);
}
function themeTab(id){ themeEditScreen=id; renderThemeModal(); }
function setHue(h){
  state.themes[themeEditScreen].hue=h;
  save();
  updateThemePreview();
  if(themeEditScreen===curScreen) applyTheme(curScreen);
}
function setSat(v){
  v=Number(v);
  state.themes[themeEditScreen].sat=v;
  document.getElementById('satVal').textContent=v+'%';
  save();
  updateThemePreview();
  if(themeEditScreen===curScreen) applyTheme(curScreen);
}
function updateThemePreview(){
  const t=state.themes[themeEditScreen];
  const bgL=97-(t.sat/100)*59;
  const [r,g,b]=hslToRgb(t.hue,t.sat,bgL);
  const prev=document.getElementById('thPrev');
  if(prev) prev.style.background=`rgb(${r},${g},${b})`;
  // подсветить выбранный hue
  document.querySelectorAll('.hue-dot').forEach((el,i)=>{
    el.classList.toggle('on', Math.abs(HUE_PRESETS[i]-t.hue)<6);
  });
}
function resetThemeScreen(){
  state.themes[themeEditScreen]=Object.assign({},DEFAULT_THEMES[themeEditScreen]);
  save();
  if(themeEditScreen===curScreen) applyTheme(curScreen);
  renderThemeModal();
  toast('Сброшено');
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

/* ============================================================
   INIT
   ============================================================ */
function init(){
  load();
  // авто-генерация на сегодня при каждом открытии (если ещё не делали сегодня)
  runDailyGen();
  switchScreen('today');
  render();
}
init();

// при возврате на вкладку — проверить, не сменился ли день
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    if(state.lastGen!==todayStr()){ runDailyGen(); }
    render(); // обновить баннеры событий (время могло наступить) и бэйдж
  }
});

// Register service worker (PWA / offline). Safe to ignore on file://
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
