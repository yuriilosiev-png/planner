<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Planner — Tasks & Goals</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planner">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="favicon.png">

<style>
:root{
  --bg:#0f1115; --surface:#171a21; --surface2:#1f232c; --line:#2a2f3a;
  --txt:#e8eaed; --muted:#8b93a3; --accent:#5b9dff; --accent-dim:#1c3a63;
  --ok:#3ecf8e; --ok-dim:#143a2b; --warn:#ffb648; --danger:#ff5c5c; --danger-dim:#3a1818;
  --st-green:#3ecf8e; --st-yellow:#ffb648; --st-pink:#ff7eb6;
  --r:14px;
  /* category colors */
  --c-sport:#3ecf8e; --c-fin:#ffb648; --c-shop:#b98cff; --c-edu:#5b9dff; --c-other:#8b93a3;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg); color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:16px; line-height:1.4; overflow:hidden;
  display:flex; flex-direction:column; height:100dvh;
}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* Header */
.head{
  padding:14px 16px 10px; display:flex; align-items:baseline; justify-content:space-between;
  border-bottom:1px solid var(--line); flex-shrink:0;
}
.head h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.head .date{font-size:13px;color:var(--muted)}

/* Content */
.content{flex:1;overflow-y:auto;padding:12px 14px 90px;-webkit-overflow-scrolling:touch}
.screen{display:none}
.screen.active{display:block}

/* Task card */
.task{
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  padding:13px 14px; margin-bottom:9px; position:relative;
  display:flex; align-items:flex-start; gap:11px; transition:.15s;
}
.task.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 4px 18px rgba(91,157,255,.18)}
.task .cat-dot{width:9px;height:9px;border-radius:50%;margin-top:6px;flex-shrink:0}
.task .body{flex:1;min-width:0}
.task .ttl{font-size:15px;font-weight:500;word-break:break-word}
.task.done .ttl{text-decoration:line-through;color:var(--muted)}
.task .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.task .catname{padding:1px 7px;border-radius:6px;background:var(--surface2);font-size:11px}
.check{
  width:24px;height:24px;border-radius:7px;border:2px solid var(--line);
  flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:transparent;transition:.15s;
}
.task.done .check{background:var(--ok);border-color:var(--ok);color:#06281b}

/* Checklist / status task */
.task.cl{flex-direction:column;align-items:stretch;gap:0;cursor:default}
.cl-head{display:flex;align-items:center;gap:11px;cursor:pointer}
.cl-status{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  border:2px solid var(--line);background:var(--surface2);transition:.15s;
}
.cl-status.green{background:var(--st-green);border-color:var(--st-green);color:#06281b}
.cl-status.yellow{background:var(--st-yellow);border-color:var(--st-yellow);color:#3a2400}
.cl-status.pink{background:var(--st-pink);border-color:var(--st-pink);color:#3a0820}
.cl-head .body{flex:1;min-width:0}
.cl-chevron{font-size:13px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.task.cl.open .cl-chevron{transform:rotate(180deg)}
.cl-items{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);display:none;flex-direction:column;gap:2px}
.task.cl.open .cl-items{display:flex}
.cl-item{
  display:flex;align-items:center;gap:10px;padding:8px 4px;border-radius:9px;cursor:pointer;
}
.cl-item:active{background:var(--surface2)}
.cl-box{
  width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:.15s;
}
.cl-item.done .cl-box{background:var(--st-green);border-color:var(--st-green);color:#06281b}
.cl-item .cl-txt{flex:1;font-size:14px;word-break:break-word}
.cl-item.done .cl-txt{text-decoration:line-through;color:var(--muted)}
.cl-empty{font-size:13px;color:var(--muted);padding:6px 4px}
/* manual status picker row */
.cl-statpick{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);display:none;gap:8px}
.task.cl.open .cl-statpick{display:flex}
.cl-statpick button{
  flex:1;padding:9px 6px;border-radius:9px;font-size:12.5px;font-weight:600;
  background:var(--surface2);border:2px solid var(--line);display:flex;flex-direction:column;align-items:center;gap:3px;
}
.cl-statpick button.green.on{background:var(--st-green);border-color:var(--st-green);color:#06281b}
.cl-statpick button.yellow.on{background:var(--st-yellow);border-color:var(--st-yellow);color:#3a2400}
.cl-statpick button.pink.on{background:var(--st-pink);border-color:var(--st-pink);color:#3a0820}

/* Action bar under selected task */
.actions{
  display:flex;gap:8px;margin:-3px 0 9px;padding:0 2px;flex-wrap:wrap;
  animation:slideDown .18s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.actions button{
  flex:1;min-width:fit-content;padding:11px 10px;border-radius:11px;font-size:14px;font-weight:600;
  background:var(--surface2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;gap:6px;
}
.actions button.ok{background:var(--ok-dim);border-color:var(--ok);color:var(--ok)}
.actions button.del{background:var(--danger-dim);border-color:var(--danger);color:var(--danger)}
.actions button.move{color:var(--accent);border-color:var(--accent-dim)}
.actions button.edit{color:var(--warn)}

/* Empty state */
.empty{text-align:center;color:var(--muted);padding:54px 20px;font-size:14px}
.empty .big{font-size:40px;margin-bottom:12px;opacity:.4}

/* Section title */
.sec-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:18px 4px 9px}
.sec-title:first-child{margin-top:4px}

/* Goal card */
.goal{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r);
  padding:14px;margin-bottom:11px;
}
.goal .g-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.goal .g-name{font-size:16px;font-weight:600;word-break:break-word}
.goal .g-cat{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface2);flex-shrink:0;white-space:nowrap}
.goal .g-prog-txt{font-size:13px;color:var(--muted);margin-top:8px;display:flex;justify-content:space-between}
.goal .bar{height:7px;background:var(--surface2);border-radius:4px;margin-top:7px;overflow:hidden}
.goal .bar > i{display:block;height:100%;border-radius:4px;transition:width .4s}
.goal .g-info{font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5}
.goal .g-del{font-size:13px;color:var(--danger);margin-top:11px;padding:6px 0}

/* Floating add button */
.fab{
  position:fixed;right:18px;bottom:78px;width:56px;height:56px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:30px;font-weight:300;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 22px rgba(91,157,255,.45);z-index:40;line-height:1;
}
.fab:active{transform:scale(.92)}

/* Bottom nav */
.nav{
  position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);
  border-top:1px solid var(--line);display:flex;z-index:50;
  padding-bottom:env(safe-area-inset-bottom);
}
.nav button{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  color:var(--muted);font-size:9px;font-weight:600;position:relative;padding:0 1px;
}
.nav button .ic{font-size:19px;line-height:1}
.nav button.on{color:var(--accent)}
.nav button .badge{
  position:absolute;top:6px;right:50%;transform:translateX(15px);
  background:var(--danger);color:#fff;font-size:9px;font-weight:700;
  min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;
}

/* ===== Event reminder banners (Today) ===== */
.ev-banners{margin-bottom:14px;display:flex;flex-direction:column;gap:9px}
.ev-banner{
  display:flex;align-items:center;gap:11px;padding:12px 14px;border-radius:13px;
  background:var(--accent-dim);border:1px solid var(--accent);
}
.ev-banner .eb-ic{font-size:22px;line-height:1}
.ev-banner .eb-body{flex:1;min-width:0}
.ev-banner .eb-ttl{font-size:14.5px;font-weight:700;color:var(--txt)}
.ev-banner .eb-sub{font-size:11.5px;color:var(--muted);margin-top:2px}
.ev-banner .eb-x{font-size:18px;color:var(--muted);padding:2px 6px;line-height:1}

/* ===== Calendar screen ===== */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{
  width:38px;height:38px;border-radius:11px;background:var(--surface);border:1px solid var(--line);
  font-size:18px;color:var(--txt);display:flex;align-items:center;justify-content:center;
}
.cal-title{font-size:17px;font-weight:700;text-align:center;flex:1}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:18px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:2px 0}
.cal-cell{
  aspect-ratio:1;border-radius:10px;background:var(--surface);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-size:14px;font-weight:600;position:relative;cursor:pointer;
}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{border-color:var(--accent);border-width:2px}
.cal-cell.sel{background:var(--accent-dim);border-color:var(--accent)}
.cal-cell .cd-dots{display:flex;gap:3px;height:6px;align-items:center}
.cal-cell .cd-dot{width:6px;height:6px;border-radius:50%}
.cal-cell.other{opacity:.35}

/* Agenda list under grid */
.agenda-h{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}
.agenda-empty{color:var(--muted);font-size:13.5px;padding:8px 2px}
.ev-row{
  display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:12px;
  background:var(--surface);border:1px solid var(--line);margin-bottom:9px;cursor:pointer;
}
.ev-row .er-date{
  display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:42px;
  background:var(--surface2);border-radius:9px;padding:5px 4px;
}
.ev-row .er-day{font-size:18px;font-weight:800;line-height:1}
.ev-row .er-mon{font-size:9.5px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-top:1px}
.ev-row .er-ic{font-size:20px}
.ev-row .er-body{flex:1;min-width:0}
.ev-row .er-ttl{font-size:14.5px;font-weight:600}
.ev-row .er-sub{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:7px;flex-wrap:wrap}
.ev-row .er-note{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:3px}

/* Event type/repeat pickers in modal (reuse type-switch look) */
.ev-type-switch,.ev-rep-switch{display:flex;gap:8px;margin-bottom:14px}
.ev-type-switch button,.ev-rep-switch button{
  flex:1;padding:10px 4px;border-radius:11px;background:var(--surface2);border:2px solid var(--line);
  font-size:11px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;
}
.ev-type-switch button .ti{font-size:20px;line-height:1}
.ev-type-switch button.on,.ev-rep-switch button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.ev-alert-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ev-alert-row .ea-label{flex:1;font-size:14px;font-weight:600}
.ev-alert-row input[type=time]{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;color:var(--txt);font-size:14px}
.switch{position:relative;width:46px;height:26px;flex:none}
.switch input{opacity:0;width:0;height:0}
.switch .sl{position:absolute;inset:0;background:var(--line);border-radius:13px;transition:.2s}
.switch .sl:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.switch input:checked + .sl{background:var(--accent)}
.switch input:checked + .sl:before{transform:translateX(20px)}

/* Modal */
.modal-bg{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px);
}
.modal-bg.show{display:flex}
.modal{
  background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;
  padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:90dvh;overflow-y:auto;
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.modal h2{font-size:18px;margin-bottom:16px;font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface2);border:1px solid var(--line);
  border-radius:11px;padding:12px 13px;color:var(--txt);
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:flex;gap:10px}
.row2 .field{flex:1}
.days{display:flex;gap:6px;flex-wrap:wrap}
.days button{
  flex:1;min-width:38px;padding:9px 0;border-radius:9px;background:var(--surface2);
  border:1px solid var(--line);font-size:13px;font-weight:600;
}
.days button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.modal-btns{display:flex;gap:10px;margin-top:8px}
.modal-btns button{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:700}
.modal-btns .primary{background:var(--accent);color:#fff}
.modal-btns .ghost{background:var(--surface2);border:1px solid var(--line)}
.del-wide{width:100%;padding:13px;border-radius:12px;font-size:14px;font-weight:700;background:transparent;border:1px solid var(--danger);color:var(--danger);margin-bottom:12px}
.hint{font-size:12px;color:var(--muted);margin-top:-7px;margin-bottom:13px;line-height:1.45}
.preview{background:var(--accent-dim);border:1px solid var(--accent);border-radius:11px;padding:11px 13px;font-size:13px;margin-bottom:14px;color:#cfe0ff;line-height:1.5;display:none}
.preview.show{display:block}

/* Goal kind switch */
.kind-switch{display:flex;gap:8px;margin-bottom:14px}
.kind-switch button{
  flex:1;padding:11px 6px;border-radius:11px;background:var(--surface2);border:2px solid var(--line);
  font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.kind-switch button .ki{font-size:19px;line-height:1}
.kind-switch button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
/* Goal type switch (метка/иконка) */
.type-switch{display:flex;gap:8px;margin-bottom:14px}
.type-switch button{
  flex:1;padding:10px 4px;border-radius:11px;background:var(--surface2);border:2px solid var(--line);
  font-size:11px;font-weight:600;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;
}
.type-switch button .ti{font-size:22px;line-height:1}
.type-switch button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
/* Vision note on goal card */
.g-vision{font-size:12px;color:var(--muted);font-style:italic;margin-top:7px;line-height:1.45;opacity:.85}
/* Weekly plan editor */
.wp-day{margin-bottom:10px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:10px 11px}
.wp-day-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.wp-day-name{font-size:13px;font-weight:700}
.wp-day-count{font-size:11px;color:var(--muted)}
.wp-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.wp-item input{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:8px 10px;color:var(--txt);font-size:14px}
.wp-item .wp-del{color:var(--danger);font-size:16px;padding:2px 6px;line-height:1}
.wp-add{font-size:12.5px;color:var(--accent);font-weight:600;padding:4px 2px}
.wp-day.off{opacity:.5}
.wp-day-toggle{font-size:11px;padding:3px 9px;border-radius:7px;background:var(--surface);border:1px solid var(--line);font-weight:600}
.wp-day-toggle.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* Category manager chips */
.cats-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cat-chip{
  display:flex;align-items:center;gap:7px;padding:7px 11px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--line);font-size:13px;
}
.cat-chip .dot{width:9px;height:9px;border-radius:50%}
.cat-chip .x{color:var(--muted);font-size:15px;padding:0 2px;line-height:1}
.add-cat-row{display:flex;gap:8px;margin-bottom:8px}
.catinput-wrap{
  flex:1;display:flex;align-items:center;gap:9px;padding:0 13px;
  background:var(--surface2);border:2px solid var(--line);border-radius:11px;transition:border-color .2s;
}
.catinput-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;transition:background .2s}
.catinput-wrap input{flex:1;background:none;border:none;padding:11px 0;color:var(--txt)}
.catinput-wrap input:focus{outline:none}
.add-cat-btn{padding:0 18px;border-radius:11px;color:#fff;font-weight:700;font-size:20px;transition:background .2s}
.swatches{display:flex;gap:7px;margin:10px 0 4px;flex-wrap:wrap}
.swatch{width:30px;height:30px;border-radius:50%;border:2px solid transparent}
.swatch.on{border-color:var(--txt)}

/* History group */
.hist-day{font-size:12px;font-weight:700;color:var(--muted);margin:16px 4px 8px;letter-spacing:.3px}
.hist-item{
  background:var(--surface);border:1px solid var(--line);border-radius:11px;
  padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px;
}
.hist-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-item .ht{flex:1;font-size:14px;color:var(--muted);text-decoration:line-through}
.hist-item .hc{font-size:11px;color:var(--muted)}

/* ===== STAGE 4: Goals tabs (Активные | Долгосрочные) ===== */
.goal-tabs{display:flex;gap:8px;margin-bottom:16px}
.goal-tabs button{
  flex:1;padding:10px 8px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);
  font-size:13.5px;font-weight:600;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px;
}
.goal-tabs button.on{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.goal-tabs button .gt-count{
  font-size:11px;font-weight:700;background:var(--surface);border:1px solid var(--line);
  border-radius:8px;min-width:18px;height:18px;padding:0 5px;display:flex;align-items:center;justify-content:center;
}
.goal-tabs button.on .gt-count{background:var(--accent);border-color:var(--accent);color:#fff}

/* Deadline / term row on goal card */
.g-term{font-size:12px;color:var(--muted);margin-top:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.g-term .gt-ic{font-size:13px}
.g-term .gt-date{color:var(--txt);font-weight:600}

/* Pace badge (numeric: ahead/on/behind) */
.g-pace{
  margin-top:10px;padding:9px 12px;border-radius:10px;font-size:12.5px;line-height:1.45;
  display:flex;align-items:flex-start;gap:8px;
}

<script>
/* ============================================================
   ПЛАНЕР — каркас. Хранение в localStorage (работает на GitHub Pages).
   ============================================================ */

const DEFAULT_CATS = [
  {id:'sport',  name:'Спорт',    color:'#3ecf8e', locked:true},
  {id:'fin',    name:'Финансы',  color:'#ffb648', locked:true},
  {id:'rest',   name:'Отдых',    color:'#6ee7e7', locked:true},
  {id:'edu',    name:'Обучение', color:'#5b9dff', locked:true},
];
const SWATCH_COLORS = ['#3ecf8e','#ffb648','#b98cff','#5b9dff','#ff7eb6','#ff5c5c','#6ee7e7','#a3e635','#fb923c','#94a3b8'];
const WEEKDAYS = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс']; // index 0=Mon
const DOW_MAP = [6,0,1,2,3,4,5]; // JS getDay()=0(Sun) -> our index
const GOAL_TYPES = [
  {id:'material', emoji:'🏠', label:'Вещь',   ph:'Накопить на машину'},
  {id:'physical', emoji:'💪', label:'Тело',   ph:'Пробежать 10 км'},
  {id:'learning', emoji:'📖', label:'Навык',  ph:'Выучить английский'},
  {id:'travel',   emoji:'✈️', label:'Поездка', ph:'Съездить в Японию'},
];
function typeEmoji(t){ const o=GOAL_TYPES.find(x=>x.id===t); return o?o.emoji:'🎯'; }

const EVENT_TYPES = [
  {id:'meeting',  emoji:'📅', label:'Встреча', color:'#3b82f6'},
  {id:'event',    emoji:'⭐', label:'Событие', color:'#f59e0b'},
  {id:'birthday', emoji:'🎂', label:'День рожд.', color:'#ec4899'},
];
const EVENT_REPEATS = [
  {id:'once',    label:'Один раз'},
  {id:'monthly', label:'Раз в месяц'},
  {id:'yearly',  label:'Раз в год'},
];
function evType(id){ return EVENT_TYPES.find(x=>x.id===id)||EVENT_TYPES[1]; }
function evRepeatLabel(id){ const o=EVENT_REPEATS.find(x=>x.id===id); return o?o.label:'Один раз'; }
const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_RU_SHORT = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

/* ---------- State ---------- */
let state = {
  cats: [],
  goals: [],      // {id,name,catId,start,target,unit,deadline,days:[0..6],created,createdDate}
  tasks: [],      // {id,date:'YYYY-MM-DD',title,catId,goalId|null,done,manual,segmentVal|null}
  events: [],     // {id,date,title,type,repeat,note,alert:{on,time,shownFor:[]}}
  achieved: [],   // {id,name,catId,type,kind,vision,start,target,unit,createdDate,deadline,achievedDate}
  lastGen: null,  // last date we auto-generated for
  themes: null,   // {today:{hue,sat}, goals:{...}, undone:{...}, history:{...}}
};
let selectedTaskId = null;

// Дефолтные темы экранов: hue (оттенок 0-360), sat (насыщенность 0-100; 0=почти белый/серый)
const DEFAULT_THEMES = {
  today:   {hue:222, sat:14},
  goals:   {hue:152, sat:14},
  undone:  {hue:30,  sat:14},
  history: {hue:265, sat:14},
  calendar:{hue:200, sat:14},
};

/* ---------- Persistence ---------- */
function load(){
  try{
    const raw = localStorage.getItem('planner_v1');
    if(raw){ state = JSON.parse(raw); }
  }catch(e){}
  if(!state.cats || !state.cats.length) state.cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
  if(!state.goals) state.goals = [];
  if(!state.tasks) state.tasks = [];
  if(!state.events) state.events = [];
  if(!state.achieved) state.achieved = [];
  if(!state.themes) state.themes = JSON.parse(JSON.stringify(DEFAULT_THEMES));
  // подстраховка: если в сохранёнке нет какого-то экрана
  for(const k in DEFAULT_THEMES){ if(!state.themes[k]) state.themes[k]=Object.assign({},DEFAULT_THEMES[k]); }
  migrate();
}
/* ---------- Migration (не теряем старые данные) ---------- */
function migrate(){
  // гарантируем встроенные категории (locked) — добавляем недостающие, не трогаем пользовательские
  DEFAULT_CATS.forEach(dc=>{
    const ex = state.cats.find(c=>c.id===dc.id);
    if(!ex) state.cats.push(Object.assign({},dc));
    else ex.locked = true; // помечаем как встроенную
  });
  // цели: проставить kind по умолчанию numeric, обернуть числовые поля
  state.goals.forEach(g=>{
    if(!g.kind) g.kind = 'numeric';
    if(g.kind==='numeric' && !g.numeric){
      g.numeric = { start:g.start, target:g.target, unit:g.unit||'' };
    }
    if(!g.weeklyPlan) g.weeklyPlan = {0:[],1:[],2:[],3:[],4:[],5:[],6:[]};
    if(!g.type) g.type = 'physical';
    if(g.vision===undefined) g.vision = '';
    // Stage 4: ручной факт прогресса (только numeric) + дата ввода
    if(g.factValue===undefined) g.factValue = null;
    if(g.factDate===undefined) g.factDate = null;
    // Stage 4: deadline может быть у любого типа; если поля нет — оставляем как есть (null = бессрочная)
    if(g.deadline===undefined) g.deadline = null;
  });
  // задачи: проставить kind (старые = numeric, manual-флаг сохраняется)
  state.tasks.forEach(t=>{
    if(!t.kind) t.kind = t.manual ? 'manual_task' : 'numeric';
    if(t.status===undefined) t.status = null;
  });
  // события: нормализация полей
  if(!state.events) state.events=[];
  state.events.forEach(normEvent);
  // Stage 4: достигнутые цели
  if(!state.achieved) state.achieved=[];
}
function save(){
  try{ localStorage.setItem('planner_v1', JSON.stringify(state)); }catch(e){}
}

/* ---------- Date helpers ---------- */
function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

/* ---------- Events: повторы и выборки ---------- */
// нормализация события (миграция/подстраховка полей)
function normEvent(e){
  if(!e.type) e.type='event';
  if(!e.repeat) e.repeat='once';
  if(e.note===undefined) e.note='';
  if(!e.alert) e.alert={on:false,time:'09:00',shownFor:[]};
  if(e.alert.on===undefined) e.alert.on=false;
  if(!e.alert.time) e.alert.time='09:00';
  if(!Array.isArray(e.alert.shownFor)) e.alert.shownFor=[];
  return e;
}
// срабатывает ли событие e на дату dateStr (учёт repeat)
function eventOccursOn(e, dateStr){
  if(!e.date) return false;
  if(e.date===dateStr) return true;
  if(e.repeat==='once') return false;
  const [ey,em,ed]=e.date.split('-').map(Number);
  const [ty,tm,td]=dateStr.split('-').map(Number);
  if(dateStr < e.date) return false; // повтор не раньше исходной даты
  if(e.repeat==='monthly'){
    // тот же день месяца; для коротких месяцев — последний день
    const lastDay=new Date(ty,tm,0).getDate();
    const wantDay=Math.min(ed,lastDay);
    return td===wantDay;
  }
  if(e.repeat==='yearly'){
    const lastDay=new Date(ty,em,0).getDate(); // em — месяц исходного события
    const wantDay=Math.min(ed,lastDay);
    return (tm===em && td===wantDay);
  }
  return false;
}
// все события, попадающие на дату (отсортированы по типу)
function eventsOnDate(dateStr){
  return (state.events||[]).filter(e=>eventOccursOn(e,dateStr));
}
// уникальные типы событий на дату (для точек в сетке)
function eventTypesOnDate(dateStr){
  const set=[];
  eventsOnDate(dateStr).forEach(e=>{ if(!set.includes(e.type)) set.push(e.type); });
  return set;
}
function fmtDateHuman(s){
  const [y,m,d]=s.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const wd=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'][dt.getDay()];
  const mo=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'][m-1];
  return wd+', '+d+' '+mo;
}
function dowIndex(s){ const [y,m,d]=s.split('-').map(Number); return DOW_MAP[new Date(y,m-1,d).getDay()]; }
function addDays(s,n){ const [y,m,d]=s.split('-').map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n); return todayStr(dt); }
function daysBetween(a,b){ const [y1,m1,d1]=a.split('-').map(Number),[y2,m2,d2]=b.split('-').map(Number); return Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000); }

/* ============================================================
   STAGE 4 — долгосрочные цели: срок, темп, факт
   ============================================================ */
// есть дедлайн → цель считается долгосрочной
function isLongTerm(g){ return !!g.deadline; }

// максимальная дата дедлайна = сегодня + 5 лет (для ограничения в форме)
function maxDeadline(fromStr){
  fromStr = fromStr || todayStr();
  const [y,m,d]=fromStr.split('-').map(Number);
  const dt=new Date(y+5,m-1,d);
  return todayStr(dt);
}
// русский плюрал: forms = [1, 2-4, 5+]
function plural(n, forms){
  n = Math.abs(n) % 100;
  const n1 = n % 10;
  if(n > 10 && n < 20) return forms[2];
  if(n1 > 1 && n1 < 5) return forms[1];
  if(n1 === 1) return forms[0];
  return forms[2];
}
// человекочитаемый оставшийся срок: {text, overdue, days}
function remainingTerm(fromStr, toStr){
  const totalDays = daysBetween(fromStr, toStr);
  if(totalDays < 0) return { text:'просрочена', overdue:true, days:totalDays };
  if(totalDays === 0) return { text:'сегодня дедлайн', overdue:false, days:0 };
  const [fy,fm,fd]=fromStr.split('-').map(Number);
  const [ty,tm,td]=toStr.split('-').map(Number);
  let years = ty - fy, months = tm - fm, days = td - fd;
  if(days < 0){ months -= 1; days += new Date(ty, tm-1, 0).getDate(); }
  if(months < 0){ years -= 1; months += 12; }
  const parts=[];
  if(years>0)  parts.push(years + ' ' + plural(years,['год','года','лет']));
  if(months>0) parts.push(months + ' ' + plural(months,['мес','мес','мес']));
  if(days>0 && years===0) parts.push(days + ' ' + plural(days,['день','дня','дней']));
  if(!parts.length) parts.push(totalDays + ' ' + plural(totalDays,['день','дня','дней']));
  return { text:'осталось ' + parts.join(' '), overdue:false, days:totalDays };
}
// ДД.ММ.ГГГГ
function fmtFull(s){ if(!s) return '—'; const [y,m,d]=s.split('-'); return d+'.'+m+'.'+y; }

// план numeric на произвольную дату (даже не активный день)
function planValueOn(goal, dateStr){
  if(!goal.deadline) return null;
  if(daysBetween(goal.createdDate, dateStr) <= 0) return Math.round(goal.start);
  if(daysBetween(dateStr, goal.deadline) <= 0) return Math.round(goal.target);
  let cur=dateStr, guard=0;
  while(guard<400){
    const v=goalValueForDate(goal, cur);
    if(v!==null) return v;
    cur=addDays(cur,-1); guard++;
    if(daysBetween(goal.createdDate,cur)<0) break;
  }
  return Math.round(goal.start);
}
// темп: сравнение факта (на дату ввода) с планом на ту же дату.
// {plan, planToday, fact, diff, status:'ahead'|'on'|'behind', factAgeDays} | null
function paceInfo(goal, today){
  today = today || todayStr();
  const fv=goal.factValue, fd=goal.factDate;
  if(fv===undefined || fv===null || fv==='' || !fd) return null;
  const fact = Number(fv);
  if(isNaN(fact)) return null;
  const planAtFact = planValueOn(goal, fd);
  const planToday = planValueOn(goal, today);
  if(planAtFact===null) return null;
  const dir = goal.target>=goal.start ? 1 : -1;
  const signed = (fact - planAtFact) * dir;
  let status;
  if(Math.abs(fact - planAtFact) < 1e-9) status='on';
  else if(signed>0) status='ahead';
  else status='behind';
  return {
    plan: planAtFact, planToday, fact,
    diff: Math.abs(Math.round(signed)),
    status, factAgeDays: daysBetween(fd, today)
  };
}

/* ---------- ID ---------- */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---------- Status (цвет дня по подпунктам) ---------- */
function calcStatus(items){
  if(!items || !items.length) return null;
  const total = items.length;
  const done = items.filter(i=>i.done).length;
  if(done===0) return null;
  const pct = done/total;
  if(pct>=1) return 'green';
  if(pct>0.5) return 'yellow';
  return 'pink';
}
const STATUS_EMOJI = {green:'🟢', yellow:'🟡', pink:'🌸'};
function statusGlyph(s){ return STATUS_EMOJI[s] || ''; }

/* ============================================================
   SEGMENT ENGINE — разбивка цели на ежедневные фрагменты
   ============================================================
   Логика: от start к target за период (created..deadline),
   считаем только активные дни недели (days[]).
   Текущая целевая величина на дату = линейная интерполяция
   по количеству активных дней, прошедших с начала.
*/
function activeDaysCount(fromDate, toDate, days){
  if(daysBetween(fromDate,toDate) < 0) return 0;
  let cnt=0, cur=fromDate;
  let guard=0;
  while(daysBetween(cur,toDate) >= 0 && guard<4000){
    if(days.includes(dowIndex(cur))) cnt++;
    cur = addDays(cur,1); guard++;
  }
  return cnt;
}
/* СТУПЕНЧАТЫЙ режим:
   держим значение N активных дней, потом +1 (или -1) до цели.
   Интервал ступени считается АВТО: всего активных дней / число ступеней.
   Пример: 20→40 (20 ступеней) за полгода Пн-Сб → ступень каждые ~9 активных дней.
*/
function stepPlan(start, target, totalActive){
  const steps = Math.abs(target - start);          // сколько ступеней (по 1 единице)
  if(steps===0 || totalActive<=0) return {interval:totalActive||1, steps:0, dir:0};
  const interval = Math.max(1, Math.round(totalActive / steps)); // дней держим одно значение
  const dir = target>start ? 1 : -1;
  return {interval, steps, dir};
}
// Целевое значение на конкретный активный день date
function goalValueForDate(goal, date){
  if(!goal.days.includes(dowIndex(date))) return null; // не активный день
  const totalActive = activeDaysCount(goal.createdDate, goal.deadline, goal.days);
  if(totalActive<=0) return Math.round(goal.target);
  const doneActive = activeDaysCount(goal.createdDate, date, goal.days); // включая сегодня, 1-based
  const {interval, dir} = stepPlan(goal.start, goal.target, totalActive);
  // если это последний активный день (или дальше) — показываем точную цель
  if(doneActive >= totalActive) return Math.round(goal.target);
  // сколько полных ступеней прошло к этому дню
  const stepIndex = Math.floor((doneActive-1) / interval);
  let val = Math.round(goal.start) + dir*stepIndex;
  if(dir>0) val = Math.min(val, Math.round(goal.target));
  else      val = Math.max(val, Math.round(goal.target));
  return val;
}
// Предпросмотр для формы
function previewStep(start,target,deadline,createdDate,days){
  if(start===''||target===''||!deadline||!days.length) return null;
  start=Number(start); target=Number(target);
  if(isNaN(start)||isNaN(target)) return null;
  const totalActive = activeDaysCount(createdDate, deadline, days);
  if(totalActive<=0) return null;
  const {interval, steps, dir} = stepPlan(start, target, totalActive);
  return {totalActive, interval, steps, dir, span:target-start};
}

/* ============================================================
   DAILY GENERATION — создать сегодняшние задачи из целей
   ============================================================ */
function generateForDate(date){
  const dow = dowIndex(date);
  // не дублируем: для каждой цели максимум 1 авто-задача в день
  state.goals.forEach(g=>{
    const exists = state.tasks.some(t=>t.goalId===g.id && t.date===date);
    if(exists) return;
    const cat = state.cats.find(c=>c.id===g.catId);
    const catName = cat?cat.name:'';

    if(g.kind==='checklist'){
      // активный день, если в этот день недели есть подпункты
      const plan = (g.weeklyPlan && g.weeklyPlan[dow]) || [];
      if(!plan.length) return;
      state.tasks.push({
        id:uid(), date, goalId:g.id, catId:g.catId,
        title: g.name, kind:'checklist',
        items: plan.map(p=>({id:uid(), text:p.text, done:false})),
        status:null, done:false, manual:false
      });
      return;
    }

    if(g.kind==='manual'){
      // ежедневная задача со статусом вручную (по выбранным дням)
      const days = g.days && g.days.length ? g.days : [0,1,2,3,4,5,6];
      if(!days.includes(dow)) return;
      state.tasks.push({
        id:uid(), date, goalId:g.id, catId:g.catId,
        title: g.name, kind:'manual',
        status:null, done:false, manual:false
      });
      return;
    }

    // numeric (как раньше)
    const val = goalValueForDate(g, date);
    if(val===null) return; // не активный день
    state.tasks.push({
      id:uid(), date, goalId:g.id, catId:g.catId,
      title: g.name + ' — ' + val + (g.numeric&&g.numeric.unit?(' '+g.numeric.unit):(g.unit?(' '+g.unit):'')),
      kind:'numeric',
      done:false, manual:false, segmentVal:val, status:null
    });
  });
}
function runDailyGen(){
  const today = todayStr();
  generateForDate(today);
  state.lastGen = today;
  save();
}

/* ============================================================
   CALENDAR SCREEN
   ============================================================ */
let calView = null;        // {y, m} просматриваемый месяц (m: 0-11)
let calSelDate = null;     // выбранный день (YYYY-MM-DD) для агенды/добавления

function ensureCalView(){
  if(!calView){ const d=new Date(); calView={y:d.getFullYear(), m:d.getMonth()}; }
}
function calShiftMonth(delta){
  ensureCalView();
  let m=calView.m+delta, y=calView.y;
  if(m<0){ m=11; y--; } if(m>11){ m=0; y++; }
  calView={y,m};
  calSelDate=null;
  renderCalendar();
}
function calGoToday(){
  const d=new Date(); calView={y:d.getFullYear(),m:d.getMonth()};
  calSelDate=todayStr();
  renderCalendar();
}
function calPickDay(ds){
  calSelDate = (calSelDate===ds)? null : ds;
  renderCalendar();
}

function renderCalendar(){
  ensureCalView();
  const el=document.getElementById('s-calendar');
  if(!el) return;
  const {y,m}=calView;
  const today=todayStr();
  const firstDow=(new Date(y,m,1).getDay()+6)%7; // 0=Mon
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysPrev=new Date(y,m,0).getDate();

  const dowH=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(d=>`<div class="cal-dow">${d}</div>`).join('');

  let cells='';
  // дни предыдущего месяца (заполнители-приглушённые, кликабельны? нет — пустые для простоты)
  for(let i=0;i<firstDow;i++){ cells+=`<div class="cal-cell empty"></div>`; }
  for(let d=1; d<=daysInMonth; d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const types=eventTypesOnDate(ds);
    const dots=types.slice(0,3).map(t=>`<span class="cd-dot" style="background:${evType(t).color}"></span>`).join('');
    const cls=['cal-cell'];
    if(ds===today) cls.push('today');
    if(ds===calSelDate) cls.push('sel');
    cells+=`<div class="${cls.join(' ')}" onclick="calPickDay('${ds}')">
      <span>${d}</span>
      <span class="cd-dots">${dots}</span>
    </div>`;
  }

  // АГЕНДА: если выбран день — события этого дня; иначе все события месяца по датам
  let agenda='';
  if(calSelDate){
    const evs=eventsOnDate(calSelDate);
    const [yy,mm,dd]=calSelDate.split('-').map(Number);
    agenda=`<div class="agenda-h">${dd} ${MONTHS_RU[mm-1]} ${yy}</div>`;
    if(!evs.length){
      agenda+=`<div class="agenda-empty">Событий нет. Нажми «+», чтобы добавить.</div>`;
    }else{
      agenda+=evs.map(e=>evRowHTML(e,calSelDate)).join('');
    }
  }else{
    // собрать все вхождения событий в этот месяц
    const occ=[];
    for(let d=1; d<=daysInMonth; d++){
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      eventsOnDate(ds).forEach(e=>occ.push({e,ds,d}));
    }
    agenda=`<div class="agenda-h">События месяца</div>`;
    if(!occ.length){
      agenda+=`<div class="agenda-empty">В этом месяце событий нет.<br>Выбери день и нажми «+».</div>`;
    }else{
      agenda+=occ.map(o=>evRowHTML(o.e,o.ds)).join('');
    }
  }

  el.innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" onclick="calShiftMonth(-1)">‹</button>
      <div class="cal-title">${MONTHS_RU[m]} ${y}</div>
      <button class="cal-nav" onclick="calShiftMonth(1)">›</button>
    </div>
    <div class="cal-grid">${dowH}${cells}</div>
    <div style="display:flex;justify-content:center;margin:-6px 0 16px">
      <button class="cal-nav" style="width:auto;padding:0 16px;font-size:13px;font-weight:600" onclick="calGoToday()">Сегодня</button>
    </div>
    ${agenda}
  `;
}

function evRowHTML(e, dateStr){
  const t=evType(e.type);
  const [y,mn,d]=dateStr.split('-').map(Number);
  const sub=[evRepeatLabel(e.repeat)];
  if(e.alert&&e.alert.on) sub.push('🔔 '+e.alert.time);
  return `
  <div class="ev-row" onclick="openEventModal('${e.id}')">
    <div class="er-date">
      <span class="er-day">${d}</span>
      <span class="er-mon">${MONTHS_RU_SHORT[mn-1]}</span>

    <span class="er-ic">${t.emoji}</span>

      <div class="er-sub">${sub.map(s=>`<span>${esc(s)}</span>`).join('')}</div>
      ${e.note?`<div class="er-note">${esc(e.note)}</div>`:''}
    </div>
  </div>`;
}

function closeEventModal(){ evDraft=null; closeModal(); }

function saveEvent(){
  const d=evDraft; if(!d) return;
  const dateEl=document.getElementById('ev-date');
  const titleEl=document.getElementById('ev-title');
  const noteEl=document.getElementById('ev-note');
  const alertEl=document.getElementById('ev-alert');
  const timeEl=document.getElementById('ev-alert-time');
  const date=dateEl?dateEl.value:d.date;
  const title=(titleEl?titleEl.value:d.title).trim();
  const note=(noteEl?noteEl.value:d.note).trim();
  const alertOn=alertEl?alertEl.checked:d.alertOn;
  const alertTime=timeEl?timeEl.value:d.alertTime;
  if(!date){ toast('Укажите дату'); return; }
  if(!title){ toast('Введите название'); return; }

  if(d.id){
    const e=state.events.find(x=>x.id===d.id);
    if(e){
      const dateChanged=(e.date!==date);
      e.date=date; e.title=title; e.type=d.type; e.repeat=d.repeat; e.note=note;
      if(!e.alert) e.alert={on:false,time:'09:00',shownFor:[]};
      e.alert.on=alertOn; e.alert.time=alertTime;
      if(dateChanged) e.alert.shownFor=[]; // сменили дату — баннер можно показать снова
    }
    toast('Сохранено');
  }else{
    state.events.push(normEvent({
      id:uid(), date, title, type:d.type, repeat:d.repeat, note,
      alert:{on:alertOn, time:alertTime, shownFor:[]}
    }));
    toast('Событие создано');
  }
  // показать день только что добавленного/изменённого события в агенде
  calSelDate=date;
  const [yy,mm]=date.split('-').map(Number);
  calView={y:yy, m:mm-1};
  evDraft=null;
  save(); closeModal(); render();
}

function deleteEvent(id){
  if(!confirm('Удалить это событие?')) return;
  state.events=(state.events||[]).filter(e=>e.id!==id);
  evDraft=null;
  save(); closeModal(); render(); toast('Событие удалено');
}

/* ---------- Event reminder banners on Today ---------- */
// события, для которых сегодня пора показать баннер (alert включён и наступило время)
function dueEventBanners(){
  const today=todayStr();
  const now=new Date();
  const hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  return (state.events||[]).filter(e=>{
    if(!eventOccursOn(e,today)) return false;
    if(!e.alert||!e.alert.on) return false;
    if((e.alert.time||'09:00')>hhmm) return false; // ещё не наступило время
    return true;
  });
}
function eventBannersHTML(){
  const due=dueEventBanners();
  if(!due.length) return '';
  const rows=due.map(e=>{
    const t=evType(e.type);
    return `
    <div class="ev-banner">
      <span class="eb-ic">${t.emoji}</span>
      <div class="eb-body">
        <div class="eb-ttl">${esc(e.title)}</div>
        <div class="eb-sub">Сегодня · ${e.alert.time}${e.note?(' · '+esc(e.note)):''}</div>

      <span class="eb-x" onclick="dismissBanner('${e.id}')">✕</span>

  }).join('');
  return `<div class="ev-banners">${rows}</div>`;

function dismissBanner(id){
  const e=(state.events||[]).find(x=>x.id===id);
  if(e){
    if(!e.alert) e.alert={on:false,time:'09:00',shownFor:[]};
    if(!e.alert.shownFor.includes(todayStr())) e.alert.shownFor.push(todayStr());

}
// бэйдж на иконке приложения = число «непросмотренных» сегодня-напоминаний

  try{

// карточка одной цели (HTML). isLong — показывать ли блок срока/темпа/просрочки
function goalCardHTML(g, today){
  const cat = catById(g.catId);
  const isLong = isLongTerm(g);

  // --- блок срока (для долгосрочных) ---
  let termHTML='', overdueHTML='', paceHTML='';
  if(isLong){
    const rt=remainingTerm(today, g.deadline);
    if(rt.overdue){
      // просрочка → плашка с кнопками
      overdueHTML=`
      <div class="g-overdue">
        <div class="go-msg">⏰ Дедлайн наступил (${fmtFull(g.deadline)})</div>
        <div class="go-btns">
          <button class="go-done" onclick="achieveGoal('${g.id}')">✓ Достигнута</button>
          <button class="go-extend" onclick="extendGoal('${g.id}')">📅 Перенести</button>
        </div>
      </div>`;
    }else{
      termHTML=`<div class="g-term"><span class="gt-ic">⏳</span><span>${rt.text}</span><span>·</span><span class="gt-date">${fmtFull(g.deadline)}</span></div>`;
    }
    // темп — только numeric с дедлайном
    if(g.kind==='numeric' && !rt.overdue){
      const p=paceInfo(g, today);
      if(p){
        const unit=(g.numeric&&g.numeric.unit)||g.unit||'';
        const u=unit?(' '+unit):'';
        const ageTxt = p.factAgeDays===0?'сегодня':(p.factAgeDays+' '+plural(p.factAgeDays,['день','дня','дней'])+' назад');
        let ic,ttl;
        if(p.status==='ahead'){ ic='🚀'; ttl='Опережаешь на '+p.diff+u; }
        else if(p.status==='on'){ ic='🎯'; ttl='Точно по плану'; }
        else { ic='⚠️'; ttl='Отстаёшь на '+p.diff+u; }
        paceHTML=`
        <div class="g-pace ${p.status}">
          <span class="gp-ic">${ic}</span>
          <div class="gp-body">
            <div class="gp-ttl">${ttl}</div>
            <div class="gp-sub">Факт ${p.fact}${u} (${ageTxt}) · план на сегодня ${p.planToday}${u}</div>
          </div>
        </div>`;
      }else{
        paceHTML=`<div class="g-pace-none" onclick="openGoalModal('${g.id}')"><span class="gp-ic">📍</span><span>Внеси текущий факт, чтобы видеть темп</span></div>`;
      }
    }
  }

  const actions=`
    <div class="g-actions-row">
      <span class="g-edit" onclick="openGoalModal('${g.id}')">✎ Изменить</span>
      <span class="g-del" onclick="delGoal('${g.id}')">Удалить</span>
    </div>`;

  if(g.kind==='checklist'){
    const totalItems = Object.keys(g.weeklyPlan||{}).reduce((s,k)=>s+(g.weeklyPlan[k]?g.weeklyPlan[k].length:0),0);
    const activeDays = WEEKDAYS.filter((_,i)=>g.weeklyPlan&&g.weeklyPlan[i]&&g.weeklyPlan[i].length).join(' ');
    const todayItems = (g.weeklyPlan&&g.weeklyPlan[dowIndex(today)])||[];
    return `
    <div class="goal">
      <div class="g-top">
        <div class="g-name">${typeEmoji(g.type)} ${esc(g.name)}</div>
        <div class="g-cat" style="color:${cat.color}">${esc(cat.name)}</div>
      </div>
      ${g.vision?`<div class="g-vision">“${esc(g.vision)}”</div>`:''}
      <div class="g-info">
        Чек-лист по дням · ${totalItems} заданий в неделю<br>
        Дни: ${activeDays||'—'}<br>
        Сегодня: <b style="color:${cat.color}">${todayItems.length?todayItems.length+' заданий':'выходной'}</b>
      </div>
      ${termHTML}${overdueHTML}
      ${actions}
    </div>`;
  }

  if(g.kind==='manual'){
    const daysList = (g.days||[]).slice().sort((a,b)=>a-b).map(i=>WEEKDAYS[i]).join(' ');
    return `
    <div class="goal">
      <div class="g-top">
        <div class="g-name">${typeEmoji(g.type)} ${esc(g.name)}</div>
        <div class="g-cat" style="color:${cat.color}">${esc(cat.name)}</div>
      </div>
      ${g.vision?`<div class="g-vision">“${esc(g.vision)}”</div>`:''}
      <div class="g-info">
        Ручной статус (🟢/🟡/🌸)<br>
        Дни: ${daysList||'каждый день'}
      </div>
      ${termHTML}${overdueHTML}
      ${actions}
    </div>`;
  }

  // numeric
  const curTarget = goalValueForDate(g, today);
  const totalActive = activeDaysCount(g.createdDate, g.deadline, g.days);
  const span = g.target-g.start;
  const todayVal = curTarget!==null ? curTarget : g.start;
  const prog = span!==0 ? Math.min(100,Math.max(0,((todayVal-g.start)/span)*100)) : 100;
  const daysList = g.days.slice().sort((a,b)=>a-b).map(i=>WEEKDAYS[i]).join(' ');
  const unit = (g.numeric&&g.numeric.unit) || g.unit || '';
  return `
  <div class="goal">
    <div class="g-top">
      <div class="g-name">${typeEmoji(g.type)} ${esc(g.name)}</div>
      <div class="g-cat" style="color:${cat.color}">${esc(cat.name)}</div>
    </div>
    ${g.vision?`<div class="g-vision">“${esc(g.vision)}”</div>`:''}
    <div class="g-prog-txt"><span>${g.start}${unit?(' '+unit):''} → ${g.target}${unit?(' '+unit):''}</span><span>${Math.round(prog)}%</span></div>
    <div class="bar"><i style="width:${prog}%;background:${cat.color}"></i></div>
    <div class="g-info">
      Сегодня: <b style="color:${cat.color}">${curTarget!==null?(curTarget+(unit?(' '+unit):'')):'выходной'}</b><br>
      Дни: ${daysList} · всего активных дней: ${totalActive}
    </div>
    ${termHTML}${paceHTML}${overdueHTML}
    ${actions}
  </div>`;
}

function renderGoals(){
  const el = document.getElementById('s-goals');
  if(!state.goals.length){
    el.innerHTML = `<div class="empty"><div class="big">◎</div>Целей пока нет.<br>Нажми + чтобы добавить цель.<br>Приложение само разобьёт её на ежедневные шаги.</div>`;
    return;
  }
  const today = todayStr();
  const longGoals = state.goals.filter(isLongTerm);
  const activeGoals = state.goals.filter(g=>!isLongTerm(g));

  const tabs=`
    <div class="goal-tabs">
      <button class="${goalTab==='active'?'on':''}" onclick="setGoalTab('active')">Активные <span class="gt-count">${activeGoals.length}</span></button>
      <button class="${goalTab==='long'?'on':''}" onclick="setGoalTab('long')">Долгосрочные <span class="gt-count">${longGoals.length}</span></button>
    </div>`;

  const list = goalTab==='long' ? longGoals : activeGoals;
  let html=tabs;
  if(!list.length){
    if(goalTab==='long'){
      html += `<div class="empty"><div class="big">⏳</div>Долгосрочных целей нет.<br>Создай цель с дедлайном — она появится здесь со сроком и темпом.</div>`;
    }else{
      html += `<div class="empty"><div class="big">◎</div>Активных целей без дедлайна нет.<br>Все цели — во вкладке «Долгосрочные».</div>`;
    }
    el.innerHTML = html;
    return;
  }
  list.forEach(g=>{ html += goalCardHTML(g, today); });
  el.innerHTML = html;
}

  const el = document.getElementById('s-undone');
  const today = todayStr();
  // незавершённые = невыполненные numeric/manual_task с прошедшей датой.
  // checklist/manual цели НЕ переносим (по правилу — это просто картина дня).

    !t.done && t.date<today && (t.kind==='numeric'||t.kind==='manual_task'||!t.kind)
  ).sort((a,b)=>a.date<b.date?1:-1);

    const sel = t.id===selectedTaskId ? ' sel':'';

function renderHistory(){
  const el = document.getElementById('s-history');
  // СЕКЦИЯ ДОСТИГНУТЫХ ЦЕЛЕЙ (Stage 4) — сверху
  const achieved=(state.achieved||[]).slice().sort((a,b)=>a.achievedDate<b.achievedDate?1:(a.achievedDate>b.achievedDate?-1:0));
  let achHTML='';
  if(achieved.length){
    achHTML='<div class="sec-title">🏆 Достигнутые цели</div><div class="ach-section">';
    achieved.forEach(a=>{
      const cat=catById(a.catId);
      const days=daysBetween(a.createdDate,a.achievedDate);
      const daysTxt=days>0?(days+' '+plural(days,['день','дня','дней'])):'в тот же день';
      achHTML+=`
      <div class="ach-card" onclick="openAchievedDetail('${a.id}')">
        <span class="ac-trophy">${typeEmoji(a.type)}</span>
        <div class="ac-body">
          <div class="ac-name">${esc(a.name)}</div>
          <div class="ac-sub">${esc(cat.name)} · достигнута ${fmtFull(a.achievedDate)} · за ${daysTxt}</div>
        </div>
        <span class="ac-chev">›</span>
      </div>`;
    });
    achHTML+='</div>';
  }

  // в историю задач: выполненные numeric/manual_task + checklist/manual с любым статусом
  const list = state.tasks.filter(t=>{
    if(t.kind==='checklist' || t.kind==='manual') return !!t.status;
    return t.done;
  }).sort((a,b)=>{
    const d = a.date<b.date?1:(a.date>b.date?-1:0);
    return d;
  });

  if(!list.length && !achieved.length){
    el.innerHTML = `<div class="empty"><div class="big">⌗</div>История пуста.<br>Выполненные задания и достигнутые цели появятся здесь.</div>`;
    return;
  }

  let html=achHTML;
  if(list.length && achieved.length) html+='<div class="sec-title">Выполненные задания</div>';
  // group by date
  let lastDate=null;
  list.forEach(t=>{
    if(t.date!==lastDate){
      html += `<div class="hist-day">${fmtDateHuman(t.date)}</div>`;
      lastDate = t.date;
    }
    const cat = catById(t.catId);
    const stColorMap = {green:'var(--st-green)', yellow:'var(--st-yellow)', pink:'var(--st-pink)'};
    const dotColor = (t.status && stColorMap[t.status]) ? stColorMap[t.status] : cat.color;
    const stGlyph = t.status ? statusGlyph(t.status)+' ' : '';
    let extra='';
    if(t.kind==='checklist' && t.items){
      const dn=t.items.filter(i=>i.done).length;
      extra = ` (${dn}/${t.items.length})`;
    }
    const strike = (t.kind==='checklist'||t.kind==='manual') ? 'text-decoration:none' : '';
    html += `
    <div class="hist-item">
      <span class="dot" style="background:${dotColor}"></span>
      <span class="ht" style="${strike}">${stGlyph}${esc(t.title)}${extra}</span>
      <span class="hc">${esc(cat.name)}</span>
    </div>`;
  });
  el.innerHTML = html;
}

// вернуть достигнутую цель обратно в работу (на случай ошибочного нажатия)
function restoreAchieved(id){
  const a=(state.achieved||[]).find(x=>x.id===id);
  if(!a) return;
  // восстановить как numeric/checklist/manual цель с прежними полями;
  // для простоты — только если её ещё нет в активных
  if(state.goals.some(g=>g.id===id)){ toast('Цель уже активна'); closeModal(); return; }
  const today=todayStr();
  const restored={
    id:a.id, name:a.name, catId:a.catId, kind:a.kind, type:a.type, vision:a.vision,
    deadline:a.deadline||null, days:[0,1,2,3,4,5],
    factValue:null, factDate:null,
    weeklyPlan:{0:[],1:[],2:[],3:[],4:[],5:[],6:[]},
    created:Date.now(), createdDate:a.createdDate
  };
  if(a.kind==='numeric'){
    restored.start=a.start; restored.target=a.target; restored.unit=a.unit||'';
    restored.numeric={start:a.start,target:a.target,unit:a.unit||''};
    // если дедлайн в прошлом — сдвинуть на +90 дней, чтобы цель снова работала
    if(!restored.deadline || daysBetween(today,restored.deadline)<1){ restored.deadline=addDays(today,90); }
  }
  state.goals.push(restored);
  state.achieved=state.achieved.filter(x=>x.id!==id);
  save(); closeModal(); render(); toast('Возвращена в активные');
}

   TASK INTERACTIONS
   ============================================================ */
let tapTimer=null;
let openTaskId=null; // раскрытая чек-лист/manual карточка
function toggleOpen(id,e){
  if(e) e.stopPropagation();
  openTaskId = openTaskId===id ? null : id;
  render();
}
function toggleItem(taskId,itemId,e){
  if(e) e.stopPropagation();
  const t=state.tasks.find(x=>x.id===taskId);
  if(!t || !t.items) return;
  const it=t.items.find(i=>i.id===itemId);
  if(!it) return;
  it.done=!it.done;
  t.status=calcStatus(t.items);
  // done=true когда всё выполнено (для логики истории/незавершённых)
  t.done = t.status==='green';
  save();
  // не схлопываем карточку — обновляем только нужные части через render
  render();
}
function setManualStatus(taskId,key,e){
  if(e) e.stopPropagation();
  const t=state.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.status = t.status===key ? null : key;
  t.done = !!t.status; // любой выбранный статус = задача отработана за день
  save(); render();
  if(t.status) toast('Статус: '+statusGlyph(t.status));
}
function taskTap(id,e){
  if(e) e.stopPropagation();
  // single tap toggles selection; double handled separately
  clearTimeout(tapTimer);
  tapTimer = setTimeout(()=>{
    selectedTaskId = selectedTaskId===id ? null : id;
    render();
  },230);
}
function taskDblTap(id,e){
  if(e){ e.stopPropagation(); e.preventDefault(); }
  clearTimeout(tapTimer);
  // double tap = mark done immediately
  markDone(id);
}
function markDone(id){
  const t = state.tasks.find(x=>x.id===id);
  if(!t) return;
  t.done = true;
  t.doneAt = new Date().toISOString();
  selectedTaskId = null;
  save(); render(); toast('Выполнено ✓');
}
function actDone(id,e){ e.stopPropagation(); markDone(id); }
function actDelete(id,e){
  e.stopPropagation();
  state.tasks = state.tasks.filter(t=>t.id!==id);
  selectedTaskId=null; save(); render(); toast('Удалено');
}
function actMove(id,e){
